<div ngDraggable [handle]="myHandle" class="modal fade" bsModal #modalAddEdit="bs-modal" [config]="{backdrop: 'static'}"
  tabindex="-1" role="dialog" aria-labelledby="dialog-static-name" (onHidden)="OnHidden()">
  <div class="modal-dialog modal-md">
    <div class="modal-content">
      <div #myHandle class="modal-header">
        <h4 class="modal-title pull-left">Phân quyền giám sát kiểm tra phương tiện</h4>
        <button type="button" class="close pull-right" aria-label="Close" (click)="modalAddEdit.hide()">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">
        <form class="form-horizontal" novalidate #addEditForm="ngForm" (ngSubmit)="saveChange(addEditForm)"
          *ngIf="entity">
          <div class="box-body">
            <div class="form-group">
              <label class="col-sm-3 control-label">Người giám sát
                <span class="error">*</span>
              </label>
              <div class="col-sm-9">
                <ng-select name="shippingUnitId" [items]="listEmployee" bindLabel="employeeFullName" bindValue="userId"
                  [(ngModel)]="entity.userId" required placeholder="Chọn nhân viên" required>
                </ng-select>
              </div>
            </div>
            
            <fieldset style="min-height: 200px;">
              <legend style="font-size: 14px; color: blue; font-weight: bold;">Danh sách phương tiện</legend>
              <div class="form-group">
                <div class="col-md-4 text-left">
                  <button type="button" class="btn btn-success btn-sm" (click)="addDetailed()">
                    <i class="fa fa-plus"></i> Thêm
                  </button>
                </div>
              </div>
              <!-- /.box-header -->
              <div class="box-body no-padding">
                <table class="table table-bordered table-striped table-hover">
                  <thead>
                    <tr>
                      <th>Biển kiểm soát</th>
                      <th></th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr *ngFor="let item of listDetailed; let i=index;">
                      <td>
                        <ng-select name="listDetailed{{i}}" [items]="listVehicle" bindLabel="licensePlates"
                                bindValue="id" [(ngModel)]="item.vehicleId" required (change)="changedValue(item,i)">
                              </ng-select>
                      </td>
                      <td style="width:18%">
                        <button type="button" class="btn btn-warning btn-sm" (click)="delete(item)">
                          <i class="fa fa-trash"></i> Xóa
                        </button>
                      </td>
                    </tr>
                    <tr *ngIf="listDetailed?.length == 0">
                      <td colspan="100%">Không có bản ghi nào được tìm thấy!</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </fieldset>
          </div>
          <!-- /.box-body -->
          <div class="box-footer text-right">
            <button type="submit" class="btn btn-primary btn-sm" [disabled]="!addEditForm.form.valid ">
              <i class="fa fa-save"></i> Lưu</button>
            <button type="button" (click)="modalAddEdit.hide()" class="btn btn-danger btn-sm">
              <i class="fa fa-close"></i> Hủy</button>
          </div>
          <!-- /.box-footer -->
        </form>
      </div>
    </div>
  </div>
</div>
