<div ngDraggable [handle]="myHandle" class="modal fade" bsModal #modalAddEdit="bs-modal" [config]="{backdrop: 'static'}"
  tabindex="-1" role="dialog" aria-labelledby="dialog-static-name" (onHidden)="OnHidden()">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div #myHandle class="modal-header">
        <h4 class="modal-title pull-left">Đăng ký kiểm tra phương tiện</h4>
        <button type="button" class="close pull-right" aria-label="Close" (click)="modalAddEdit.hide()">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">
        <form class="form-horizontal" novalidate #addEditForm="ngForm" (ngSubmit)="saveChange(addEditForm)"
          *ngIf="entity">
          <div class="box-body">
            <div class="form-group">
              <label class="col-sm-3 control-label">Loại hình kiểm tra
                <span class="error">*</span>
              </label>
              <div class="col-sm-4">
                <ng-select name="type" [items]="listType" bindLabel="value" bindValue="id"
                  (change)="changeLoaihinh($event)" [(ngModel)]="entity.type" required placeholder="Chọn loại hình"
                  [disabled]="flagXem || entity.status>0 || !flagNew">
                </ng-select>
              </div>
              <div class="col-sm-2">
              </div>
              <label class="col-sm-1 control-label" *ngIf="!flagNew">Ngày</label>
              <div class="col-sm-2 control-label-text-left" *ngIf="!flagNew">
                <span style="font-weight: bold; color: blue;"> {{entity.createdDate | date:'dd/MM/yyyy'}}</span>
              </div>
            </div>
            <div class="form-group">
              <label class="col-sm-3 control-label">Phương tiện
                <span class="error">*</span>
              </label>
              <div class="col-sm-4">
                <ng-select name="vehicleId" [items]="listVihicle" bindLabel="licensePlates" bindValue="id"
                  [(ngModel)]="entity.vehicleId" required placeholder="Chọn phương tiện"
                  [disabled]="flagXem || entity.status>0">
                </ng-select>
              </div>
            </div>
            <div class="form-group">
              <label class="col-sm-3 control-label">Tình trạng sức khỏe
                <span class="error">*</span>
              </label>
              <div class="col-sm-4">
                <ng-select name="driverHealth" [items]="listTinhtrang" bindLabel="value" bindValue="id"
                  [(ngModel)]="entity.driverHealth" [required]="entity.type==0" [disabled]="flagXem || entity.status>0">
                </ng-select>
              </div>
            </div>
            <div class="form-group">
              <label class="col-sm-3 control-label">Thời gian làm viêc <span class="error">*</span>
              </label>
              <div class="col-sm-3">
                <input name="startWorkingTime" type="text" daterangepicker [options]="ngaybatdauOption" required
                  [(ngModel)]="entity.startWorkingTime" class="form-control" (selected)="selectedNgaybatdau($event)"
                  (hideDaterangepicker)="closedNgaybatdau($event)" autocomplete="off"
                  [disabled]="flagXem || entity.status>0">
              </div>
              <label class="col-sm-1 control-label">đến <span class="error">*</span>
              </label>
              <div class="col-sm-3">
                <input name="endWorkingTime" type="text" daterangepicker [options]="ngayketthucOption" required
                  [(ngModel)]="entity.endWorkingTime" class="form-control" (selected)="selectedNgayketthuc($event)"
                  (hideDaterangepicker)="closedNgayketthuc($event)" autocomplete="off"
                  [disabled]="flagXem || entity.status>0">
              </div>
            </div>
            <div class="form-group" *ngIf="!flagNew">
              <label class="col-sm-3 control-label">Nhận xét
              </label>
              <div class="col-sm-9">
                <input type="text" class="form-control" name="acceptNotes" style="text-align: left;"
                  [disabled]="entity.status!=0" [(ngModel)]="entity.acceptNotes" placeholder="Nhận xét"/>
              </div>
            </div>
            <fieldset>
              <legend>CHI TIẾT CÔNG VIỆC</legend>
              <div class="form-group">
                <div class="table-bordered table-responsive"
                  style="max-height: 400px; padding-left: 10px;padding-right: 10px;">
                  <table class="table table-bordered table-striped table-hover">
                    <thead>
                      <tr>
                        <th>Tên công việc</th>
                        <th>Tình trạng</th>
                        <th>Ghi chú</th>
                      </tr>
                    </thead>
                    <tbody>
                      <tr *ngFor="let item of entity.detaileds;let indexOfelement=index;">
                        <td style="width: 300px;">
                          <span>{{item.jobName}}</span>
                        </td>
                        <td>
                          <ng-select name="listFeeParking{{indexOfelement}}" [items]="listCheck" bindLabel="value"
                            bindValue="id" [(ngModel)]="item.checkValue" required>
                          </ng-select>
                          <!-- {{item.feeCode}} -->
                        </td>

                        <td style="width: 300px;">
                          <input type="text" class="form-control" name="ten{{indexOfelement}}" style="text-align: left;"
                            [style.background-color]="item.checkValue>0 ? '#BCDBDA'  : null" [(ngModel)]="item.notes"
                            placeholder="Ghi chú" [readonly]="flagXem" [required]="item.checkValue>0" />
                        </td>

                      </tr>
                      <tr *ngIf="entity.detaileds?.length == 0">
                        <td colspan="100%">Không có bản ghi nào được tìm thấy!</td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              </div>
            </fieldset>
          </div>
          <!-- /.box-body -->
          <div class="box-footer text-right">
            <button *ngIf="hasPermissionApproved && entity.status ==0 && !flagNew" type="button" (click)="accept(1)"
              class="btn btn-success btn-sm">
              <i class="fa fa-check"></i> Duyệt</button>
            <button *ngIf="hasPermissionApproved  && entity.status==0  && !flagNew" type="button" (click)="accept(-1)"
              class="btn btn-warning btn-sm" [disabled]="entity.acceptNotes?.trim().length<1">
              <i class="fa fa-exclamation-triangle"></i> Từ chối</button>
            <button *ngIf="flagNew" type="submit" class="btn btn-primary btn-sm" [disabled]="!addEditForm.form.valid || flagSave">
              <i class="fa fa-edit"></i> Lưu</button>
            <button type="button" (click)="modalAddEdit.hide()" class="btn btn-danger btn-sm">
              <i class="fa fa-close"></i> Hủy</button>
          </div>
          <!-- /.box-footer -->
        </form>
      </div>
    </div>
  </div>
</div>
