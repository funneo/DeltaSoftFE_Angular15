<div ngDraggable [handle]="myHandle" class="modal fade" bsModal #modalAddEdit="bs-modal" [config]="{backdrop: 'static'}"
  tabindex="-1" role="dialog" aria-labelledby="dialog-static-name" (onHidden)="OnHidden()">
  <div class="modal-dialog modal-md">
    <div class="modal-content">
      <div #myHandle class="modal-header">
        <h4 class="modal-title pull-left">Phân quyền ngoài giờ/phép</h4>
        <button type="button" class="close pull-right" aria-label="Close" (click)="modalAddEdit.hide()">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">
        <form class="form-horizontal" novalidate #addEditForm="ngForm" (ngSubmit)="saveChange(addEditForm)"
          *ngIf="entity">
          <div class="box-body">
            <div class="form-group">
                <label class="col-sm-3 control-label">Người dùng 
                    <span class="error">*</span>
                  </label>
                  <div class="col-sm-9">
                    <ng-select name="userId" [items]="listUser" bindLabel="userName" bindValue="id"
                      [(ngModel)]="entity.userId" required placeholder="Chọn người dùng" [disabled]="flagXem">
                    </ng-select>
                  </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">Chi nhánh 
                    <span class="error">*</span>
                  </label>
                  <div class="col-sm-9">
                    <ng-select name="branchId" [items]="listBranch" bindLabel="branchCode" bindValue="id"
                      [(ngModel)]="entity.branchId" required placeholder="Chọn chi nhánh" [disabled]="flagXem">
                    </ng-select>
                  </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">Nhóm đối tượng 
                <span class="error">*</span>
              </label>
              <div class="col-sm-9">
                <ng-select name="gasSiteId" [items]="listDepartment" bindLabel="categoryName" bindValue="id"
                  [(ngModel)]="entity.departmentId" required placeholder="Chọn nhóm đối tượng" [disabled]="flagXem">
                </ng-select>
              </div>
            </div>      
          </div>
          <!-- /.box-body -->
          <div class="box-footer text-right">
            <button *ngIf="!flagXem" type="submit" class="btn btn-primary btn-sm"
              [disabled]="!addEditForm.form.valid || flagSave  ">
              <i class="fa fa-edit"></i> Lưu</button>
            <button type="button" (click)="modalAddEdit.hide()" class="btn btn-danger btn-sm">
              <i class="fa fa-close"></i> Hủy</button>
          </div>
          <!-- /.box-footer -->
        </form>
      </div>
    </div>
  </div>
</div>
