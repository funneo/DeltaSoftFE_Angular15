<div ngDraggable [handle]="myHandle" class="modal fade" bsModal #modalAddEdit="bs-modal" [config]="{backdrop: 'static'}"
  tabindex="-1" role="dialog" aria-labelledby="dialog-static-name" (onHidden)="OnHidden()">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div #myHandle class="modal-header">
        <h4 class="modal-title pull-left">Phân quyền CS</h4>
        <button type="button" class="close pull-right" aria-label="Close" (click)="modalAddEdit.hide()">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">
        <form class="form-horizontal" novalidate #addEditForm="ngForm" (ngSubmit)="saveChange(addEditForm)"
          *ngIf="entity">
          <div class="box-body">
            <div class="form-group">
              <label class="col-sm-2 control-label">Chi nhánh
                <span class="error">*</span>
              </label>
              <div class="col-sm-4">
                <ng-select name="chinhanh" [items]="listBranch" bindLabel="branchCode" bindValue="id"
                  [(ngModel)]="entity.branchId" required placeholder="Chọn chi nhánh" [clearable]="false">
                </ng-select>
              </div>
              <label class="col-sm-2 control-label">Kiểu
                <span class="error">*</span>
              </label>
              <div class="col-sm-4">
                <ng-select name="donvi" [items]="listType" bindLabel="text" bindValue="id" [(ngModel)]="_type" required
                  placeholder="Chọn cách phân quyền" [clearable]="false" [readonly]="entity.id>0"
                  (change)="changedType()">
                </ng-select>
              </div>
            </div>
            <div *ngIf="_type==0" class="form-group">
              <label class="col-sm-2 control-label">Khách hàng
                <span class="error">*</span>
              </label>
              <div class="col-sm-10">
                <ng-select name="khachhang" [items]="listCustomer" bindLabel="customerName" bindValue="id"
                  [(ngModel)]="_customerId" required placeholder="Chọn khách hàng">
                </ng-select>
              </div>
            </div>
            <div *ngIf="_type==1" class="form-group">
              <label class="col-sm-2 control-label">CS
                <span class="error">*</span>
              </label>
              <div class="col-sm-4">
                <ng-select name="user" [items]="listUser" bindLabel="userName" bindValue="userName"
                  [(ngModel)]="_userName" required placeholder="Chọn tài khoản nhân viên...">
                </ng-select>
              </div>
            </div>

            <br>

            <div class="form-group">
              <label class="col-sm-2 control-label" style="color: red;">Tìm kiếm</label>
              <div *ngIf="_type==0" class="col-sm-4">
                <div class="input-group">
                  <input type="text" [(ngModel)]="userName" [typeahead]="dataSource" typeaheadOptionField="userName"
                    (typeaheadOnSelect)="typeaheadOnSelectUser($event)" name="taikhoan" class="form-control"
                    placeholder="Tìm kiếm tài khoản..." autocomplete="off" [readonly]="flagXem" [typeaheadOptionsLimit]="12"
                    [typeaheadMinLength]="1" [typeaheadAsync]="true"
                    (typeaheadLoading)="changeTypeaheadLoadingUser($event)"
                    (typeaheadNoResults)="changeTypeaheadNoResultsUser($event)" focus [typeaheadWaitMs]="300"
                    [readonly]="entity.id" />
                  <span class="input-group-addon">
                    <i class="fa fa-search"></i>
                  </span>
                </div>
              </div>
              <div *ngIf="_type==1" class="col-sm-4">
                <div class="input-group">
                  <input type="text" [(ngModel)]="userName" [typeahead]="dataSource" typeaheadOptionField="customerName"
                    (typeaheadOnSelect)="typeaheadOnSelectCustomer($event)" name="khachhang" class="form-control"
                    placeholder="Tìm kiếm khách hàng..." autocomplete="off" [readonly]="flagXem" [typeaheadOptionsLimit]="12"
                    [typeaheadMinLength]="1" [typeaheadAsync]="true"
                    (typeaheadLoading)="changeTypeaheadLoadingUser($event)"
                    (typeaheadNoResults)="changeTypeaheadNoResultsUser($event)" focus [typeaheadWaitMs]="300"
                    [readonly]="entity.id" />
                  <span class="input-group-addon">
                    <i class="fa fa-search"></i>
                  </span>
                </div>
              </div>
              <div class="col-sm-6 text-right">
                <label class="custom-checkbox">
                  <input type="checkbox" [(ngModel)]="entity.status" name="status" />
                  <span class="helping-el"></span>
                  Kích hoạt
                </label>
              </div>
            </div>


            <div class="table-wrapper-scroll-y my-custom-scrollbar" style="height: 400px;">
              <table class="table table-bordered" id="style-scroll-1">
                <thead>
                  <tr>
                    <th class="column-so-thu-tu">TT</th>
                    <th>TK</th>
                    <th class="column-ck">CS</th>
                    <th class="column-ck">Mở Job</th>
                    <th class="column-ck">Duyệt Debit</th>
                    <th class="column-ck">Mở Debit</th>
                    <th class="column-ck">Khóa Debit</th>
                    <!-- <th class="column-ghi-chu">Ghi chú</th> -->
                    <th class="column-chucnang"></th>
                  </tr>
                </thead>
                <tbody>
                  <tr *ngFor="let item of listPermissionCS; let i = index">
                    <td class="column-so-thu-tu">{{i+1}}</td>
                    <td *ngIf="_type==0" class="column-ten">
                      <input type="text" class="form-control" name="user{{item?.id}}" [(ngModel)]="item.userName"
                        placeholder="Nhân viên..." />
                    </td>
                    <td *ngIf="_type==1" class="column-khach-hang">
                      <input type="text" class="form-control" name="khachhang{{item?.id}}"
                        [(ngModel)]="item.customerName" placeholder="Khách hàng..." />
                    </td>
                    <td class="table-checkbox">
                      <label class="custom-checkbox">
                        <input type="checkbox" value="{{item.id}}" [checked]="item.isCS" (click)="clickRow1(item)" />
                        <span class="helping-el"></span>
                      </label>
                    </td>
                    <td class="table-checkbox">
                      <label class="custom-checkbox">
                        <input type="checkbox" value="{{item.id}}" [checked]="item.isOpenJob"
                          (click)="clickRow2(item)" />
                        <span class="helping-el"></span>
                      </label>
                    </td>
                    <td class="table-checkbox">
                      <label class="custom-checkbox">
                        <input type="checkbox" value="{{item.id}}" [checked]="item.isAcceptDebit"
                          (click)="clickRow3(item)" />
                        <span class="helping-el"></span>
                      </label>
                    </td>
                    <td class="table-checkbox">
                      <label class="custom-checkbox">
                        <input type="checkbox" value="{{item.id}}" [checked]="item.isOpenDebit"
                          (click)="clickRow4(item)" />
                        <span class="helping-el"></span>
                      </label>
                    </td>
                    <td class="table-checkbox">
                      <label class="custom-checkbox">
                        <input type="checkbox" value="{{item.id}}" [checked]="item.isClosingDebit"
                          (click)="clickRow5(item)" />
                        <span class="helping-el"></span>
                      </label>
                    </td>
                    <!-- <td class="column-ghi-chu">
                          <input type="text" name="ghichu{{item.id}}"
                            [(ngModel)]="item.notes" />
                        </td> -->
                    <td class="column-chuc-nang">
                      <i class="fa fa-trash-o" *ngIf="item.id!= null && !flagXem && !entity.id"
                        (click)="removeItem(i)"></i>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
          <!-- </div> -->
          <!-- /.box-body -->
          <div class="box-footer text-right">
            <button *ngIf="!flagXem" type="submit" class="btn btn-primary btn-sm"
              [disabled]="!addEditForm.form.valid || flagSave || listPermissionCS.length==0">
              <i class="fa fa-save"></i> Lưu</button>
            <button type="button" (click)="modalAddEdit.hide()" class="btn btn-danger btn-sm">
              <i class="fa fa-close"></i> Hủy</button>
          </div>
          <!-- /.box-footer -->
        </form>
      </div>
    </div>
  </div>
</div>
