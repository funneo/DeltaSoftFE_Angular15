<p>modal-chuc-nang works!</p>
<div ngDraggable [handle]="myHandle" class="modal fade" bsModal #modalAddEdit="bs-modal" [config]="{backdrop: 'static'}"
  tabindex="-1" role="dialog" aria-labelledby="dialog-static-name" (onHidden)="OnHidden()">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div #myHandle class="modal-header">
        <h4 class="modal-title pull-left">Chức năng</h4>
        <button type="button" class="close pull-right" aria-label="Close" (click)="modalAddEdit.hide()">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">
        <form class="form-horizontal" novalidate #addEditForm="ngForm" (ngSubmit)="saveChange(addEditForm)"
          *ngIf="entity">
          <div class="box-body">
                <div class="form-group">
                  <label for="inputEmail3" class="col-sm-3 control-label">Mã chức năng</label>
                  <div class="col-sm-9">
                    <input type="text" #id="ngModel" [(ngModel)]="entity.id" required name="id"
                      class="form-control" placeholder="Nhập mã chức năng" focus [readonly]="flagEdit"/>
                    <small [hidden]="id.valid || (id.pristine && !addEditForm.submitted)" class="text-danger">
                      Bạn phải nhập mã chức năng
                    </small>
                  </div>
                </div>
                <div class="form-group">
                  <label for="inputEmail3" class="col-sm-3 control-label">Tên chức năng</label>
                  <div class="col-sm-9">
                    <input type="text" #name="ngModel" [(ngModel)]="entity.name" required minlength="3" name="name"
                      class="form-control" placeholder="Nhập tên chức năng" focus [readonly]="flagXem" />
                    <small [hidden]="name.valid || (name.pristine && !addEditForm.submitted)" class="text-danger">
                      Bạn phải nhập tên ít nhất 3 ký tự
                    </small>
                  </div>
                </div>
                <div class="form-group">
                  <label for="inputEmail3" class="col-sm-3 control-label">Thứ tự</label>
                  <div class="col-sm-9">
                    <input type="number" #displayOrder="ngModel" [(ngModel)]="entity.sortOrder" required
                      name="displayOrder" class="form-control" placeholder="Nhập thứ tự hiển thị"
                      [readonly]="flagXem" />
                    <small [hidden]="displayOrder.valid || (displayOrder.pristine && !addEditForm.submitted)"
                      class="text-danger">
                      Bạn phải nhập thứ tự
                    </small>
                  </div>
                </div>
                <div class="form-group">
                  <label for="inputEmail3" class="col-sm-3 control-label">Đường dẫn (WebApp)</label>
                  <div class="col-sm-9">
                    <input type="text" #url="ngModel" [(ngModel)]="entity.url" name="url" class="form-control"
                      placeholder="Nhập đường dẫn" [readonly]="flagXem" />
                    <small [hidden]="url.valid || (url.pristine && !addEditForm.submitted)" class="text-danger">
                      Bạn phải nhập đường dẫn
                    </small>
                  </div>
                </div>
                <div class="form-group">
                  <label for="inputEmail3" class="col-sm-3 control-label">Đường dẫn (WinApp)</label>
                  <div class="col-sm-9">
                    <input type="text" #url="ngModel" [(ngModel)]="entity.nameClass" name="class" class="form-control"
                      placeholder="Nhập đường dẫn" [readonly]="flagXem" />
                    <small [hidden]="url.valid || (url.pristine && !addEditForm.submitted)" class="text-danger">
                      Bạn phải nhập đường dẫn
                    </small>
                  </div>
                </div>
                <div class="form-group">
                  <label for="inputEmail3" class="col-sm-3 control-label">Chức năng cha</label>
                  <div class="col-sm-9">
                    <select class="form-control select2" name="parentId" [(ngModel)]="entity.parentId"
                      [disabled]="flagXem">
                      <option value="">--Chọn chức năng cha--</option>
                      <option *ngFor="let x of _functions" [value]="x.id"
                        [ngClass]="x.parentId==null?'text-bold item-parent':''">
                        {{x.name}}</option>
                    </select>
                  </div>
                </div>
                <div class="form-group">
                  <label for="inputEmail3" class="col-sm-3 control-label">Icon CSS</label>
                  <div class="col-sm-9">
                    <input type="text" #iconCss="ngModel" [(ngModel)]="entity.cssClass" name="iconCss"
                      class="form-control" placeholder="Nhập biểu tượng hiển thị" [readonly]="flagXem" />
                  </div>
                </div>
                <div class="form-group">
                  <label for="inputEmail3" class="col-sm-3 control-label"></label>
                  <div class="col-sm-3">
                    <label>
                      <input type="checkbox" [(ngModel)]="entity.isMenu" name="menu" [readonly]="flagXem"> Hiện thị menu
                    </label>
                  </div>
                  <!-- <label for="inputEmail3" class="col-sm-3 control-label">Trạng thái</label> -->
                  <div class="col-sm-3">
                    <label>
                      <input type="checkbox" [(ngModel)]="entity.status" name="status" #status="ngModel"
                        [readonly]="flagXem"> Kích hoạt
                    </label>
                  </div>
                </div>
          </div>
          <!-- /.box-body -->
          <div class="box-footer text-right">
            <button *ngIf="!flagXem" type="submit" class="btn btn-primary btn-sm"
              [disabled]="!addEditForm.form.valid || flagSave ">
              <i class="fa fa-save"></i> Lưu</button>
            <button type="button" (click)="modalAddEdit.hide()" class="btn btn-danger btn-sm">
              <i class="fa fa-close"></i> Hủy</button>
          </div>
          <!-- /.box-footer -->
        </form>
      </div>
    </div>
  </div>
</div>
<!-- Simple syntax -->
<div [ngBusy]="busy"></div>
