<div ngDraggable [handle]="myHandle" class="modal fade" bsModal #modalAddEdit="bs-modal" [config]="{backdrop: 'static'}"
  tabindex="-1" role="dialog" aria-labelledby="dialog-static-name" (onHidden)="OnHidden()">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div #myHandle class="modal-header">
        <h4 class="modal-title pull-left">Quyền duyệt thanh toán</h4>
        <button type="button" class="close pull-right" aria-label="Close" (click)="modalAddEdit.hide()">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">
        <form class="form-horizontal" novalidate #addEditForm="ngForm" (ngSubmit)="saveChange(addEditForm)"
          *ngIf="entity">
          <div class="box-body">
            <div class="form-group">
              <label class="col-sm-3 control-label">Chi nhánh
                <span class="error">*</span>
              </label>
              <div class="col-sm-9">
                <ng-select name="donvi" [items]="listBranch" bindLabel="branchName" bindValue="id"
                  [(ngModel)]="entity.branchId" required placeholder="Chọn chi nhánh" [readonly]="flagXem" (change)="changedBranch($event)">
                </ng-select>
              </div>
            </div>
            <div class="form-group">
              <label class="col-sm-3 control-label">Tài khoản
                <span class="error">*</span>
              </label>
              <div class="col-sm-9">
                <ng-select name="user" [items]="listUser" bindLabel="userName" bindValue="userName"
                  [(ngModel)]="entity.userName" required [readonly]="flagXem" placeholder="Chọn tài khoản người dùng">
                </ng-select>
              </div>
            </div>
            <div class="form-group">
              <label class="col-sm-3 control-label">Kiểu duyệt
                <span class="error">*</span>
              </label>
              <div class="col-sm-9">
                <ng-select name="type" [items]="listType" bindLabel="name" bindValue="id" [(ngModel)]="entity.type"
                  required placeholder="Kiểu duyệt" [readonly]="flagXem">
                </ng-select>
              </div>
            </div>
            <div *ngIf="entity.type==0" class="form-group">
              <label class="col-sm-3 control-label">Nhóm phí thanh toán
                <span class="error">*</span>
              </label>
              <div class="col-sm-9">
                <ng-select name="feepayment" [items]="listPaymentGroup" bindLabel="paymentGroupName" bindValue="id"
                  [(ngModel)]="listItems" required placeholder="Chọn nhóm phí thanh toán" [multiple]="true" [readonly]="flagXem">
                </ng-select>
              </div>
            </div>
            <div class="form-group">
              <label class="col-sm-3 control-label">Người làm thanh toán
              </label>
              <div class="col-sm-9">
                <ng-select name="nguoitt" [items]="listEmployee" bindLabel="employeeFullName" bindValue="id"
                  [(ngModel)]="listNguoiThanhToan" placeholder="Chọn người thanh toán" [multiple]="true" [readonly]="flagXem">
                </ng-select>
              </div>
            </div>
            <!-- <div class="form-group">
              <label class="col-sm-3 control-label">Ghi chú</label>
              <div class="col-sm-9">
                <textarea class="form-control textrea-size" [(ngModel)]="entity.notes" name="ghichu" rows="3"
                  placeholder="Nhập ghi chú" [readonly]="flagXem"></textarea>
              </div>
            </div> -->
            <div class="form-group">
              <label class="col-sm-3 control-label"></label>
              <div class="col-sm-4">
                <label class="custom-checkbox">
                  <input type="checkbox" [(ngModel)]="entity.status" name="status" />
                  <span class="helping-el"></span>
                  Kích hoạt
                </label>
              </div>
            </div>
            <div *ngIf="entity.type==1" class="box-body">
              <div class="form-group">
                <label class="col-sm-3 control-label lable-title">Chọn khách hàng</label>
                <div class="col-sm-9">
                  <div class="input-group">
                    <input type="text" [(ngModel)]="customerName" [typeahead]="dataSource"
                      typeaheadOptionField="customerName" (typeaheadOnSelect)="typeaheadOnSelectCustomer($event)"
                      name="customername" class="form-control" placeholder="Nhập mã hoặc tên khách hàng"
                      autocomplete="off" [readonly]="flagXem" [typeaheadOptionsLimit]="12" [typeaheadMinLength]="1"
                      [typeaheadAsync]="true" (typeaheadLoading)="changeTypeaheadLoadingCustomer($event)"
                      (typeaheadNoResults)="changeTypeaheadNoResultsCustomer($event)" focus [typeaheadWaitMs]="300" />
                    <span class="input-group-addon">
                      <i class="fa fa-search"></i>
                    </span>
                  </div>
                </div>
                <!-- <div class="col-md-2">
                  <button type="button" *ngIf="!flagXem" (click)="ShowAddCustomer()" class="btn btn-primary btn-sm">Thêm sản phẩm</button>
                </div> -->
              </div>
              <div class="table-wrapper-scroll-y my-custom-scrollbar">
                <table class="table table-bordered">
                  <thead>
                    <tr>
                      <th class="column-so-thu-tu">TT</th>
                      <th class="column-ma">Mã khách hàng</th>
                      <th class="column-ten">Khách hàng</th>
                      <th class="column-chucnang"></th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr *ngFor="let customer of listCustomerSelect; let i = index">
                      <td class="column-so-thu-tu">{{i+1}}</td>
                      <td class="column-ma">
                        <input type="text" class="form-control" name="code{{customer?.id}}"
                          [(ngModel)]="customer.customerCode" placeholder="Mã khách hàng..." [readonly]="true" />
                      </td>
                      <td class="column-ten">
                        <input type="text" class="form-control" name="name{{customer?.id}}"
                          [(ngModel)]="customer.customerName" placeholder="Tên khách hàng..." [readonly]="true" />
                      </td>
                      <td class="column-chuc-nang">
                        <i class="fa fa-trash-o" *ngIf="customer.id!= null && !flagXem" (click)="removeItem(i)"></i>
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>

          </div>
          <!-- /.box-body -->
          <div class="box-footer text-right">
            <button *ngIf="!flagXem" type="submit" class="btn btn-primary btn-sm"
              [disabled]="!addEditForm.form.valid || flagSave">
              <i class="fa fa-save"></i> Lưu</button>
            <button type="button" (click)="modalAddEdit.hide()" class="btn btn-danger btn-sm">
              <i class="fa fa-close"></i> Hủy</button>
          </div>
          <!-- /.box-footer -->
        </form>
      </div>
    </div>
  </div>
</div>
