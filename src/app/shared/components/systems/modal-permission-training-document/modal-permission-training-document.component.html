<div ngDraggable [handle]="myHandle" class="modal fade" bsModal #modalAddEdit="bs-modal" [config]="{backdrop: 'static'}"
  tabindex="-1" role="dialog" aria-labelledby="dialog-static-name" (onHidden)="OnHidden()">
  <div class="modal-dialog modal-md">
    <div class="modal-content">
      <div #myHandle class="modal-header">
        <h4 class="modal-title pull-left">Phân quyền duyệt Tài liệu đào tạo</h4>
        <button type="button" class="close pull-right" aria-label="Close" (click)="modalAddEdit.hide()">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">
        <form class="form-horizontal" novalidate #addEditForm="ngForm" (ngSubmit)="saveChange(addEditForm)"
          *ngIf="entity">
          <div class="box-body">
            <div class="form-group">
                <label class="col-sm-3 control-label">Chi nhánh 
                    <span class="error">*</span>
                  </label>
                  <div class="col-sm-9">
                    <ng-select name="branchId" [items]="listBranch" bindLabel="branchCode" bindValue="id"
                      [(ngModel)]="entity.branchId" required placeholder="Chọn chi nhánh" [disabled]="flagXem">
                    </ng-select>
                  </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">Nhóm tài liệu 
                    <span class="error">*</span>
                  </label>
                  <div class="col-sm-9">
                    <ng-select name="groupL1Id" [items]="arrayGroupL1" bindLabel="name" bindValue="id" (change)="onChangeGroupL1($event)"
                      [(ngModel)]="entity.groupL1Id" required placeholder="Chọn nhóm tài liệu" [disabled]="flagXem">
                    </ng-select>
                  </div>
            </div>
            <div class="form-group" *ngIf="entity.groupL1Id === 2">
                <label class="col-sm-3 control-label">Nhóm nghệp vụ
                    <span class="error">*</span>
                  </label>
                  <div class="col-sm-9">
                    <ng-select name="groupL2Id" [items]="listGroupL2" bindLabel="categoryName" bindValue="id"
                      [(ngModel)]="entity.groupL2Id" required placeholder="Chọn nhóm nghiệp vụ" [disabled]="flagXem">
                    </ng-select>
                  </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">Người dùng 
                    <span class="error">*</span>
                  </label>
                  <div class="col-sm-9">
                    <ng-select name="userId" [items]="listUser" bindLabel="userName" bindValue="id"
                      [(ngModel)]="entity.userId" required placeholder="Chọn người dùng" [disabled]="flagXem">
                    </ng-select>
                  </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">Bước duyệt
                    <span class="error">*</span>
                  </label>
                  <div class="col-sm-9">
                    <ng-select name="step" [items]="listLevel" bindLabel="name" bindValue="id"
                      [(ngModel)]="entity.step" required placeholder="Chọn bước duyệt" [disabled]="flagXem">
                    </ng-select>
                  </div>
            </div>
            <div class="table-wrapper-scroll-y my-custom-scrollbar" style="height: 400px;" hidden>
              <table class="table table-bordered" id="style-scroll-1">
                <thead>
                  <tr>
                    <th class="column-so-thu-tu">TT</th>
                    <th class="column-ck">Mã khách hàng</th>
                    <th class="column-ck">Tên khách hàng</th>
                    <!-- <th class="column-ghi-chu">Ghi chú</th> -->
                    <th class="column-chucnang"></th>
                  </tr>
                </thead>
                <tbody>
                  <tr *ngFor="let item of entity.customers; let i = index">
                    <td class="column-so-thu-tu">{{i+1}}</td>
                    <td class="column-ten">
                      <span>{{item?.customerCode}}</span>
                    </td>
                    <td class="column-khach-hang">
                      <span>{{item?.customerName}}</span>
                    </td>
                    
                    <td class="column-chuc-nang">
                      <i class="fa fa-trash-o" *ngIf="item.id!= null && !flagXem && !entity.id"
                        (click)="removeItem(i)"></i>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
          <!-- /.box-body -->
          <div class="box-footer text-right">
            <button *ngIf="!flagXem" type="submit" class="btn btn-primary btn-sm"
              [disabled]="!addEditForm.form.valid || flagSave  ">
              <i class="fa fa-edit"></i> Lưu</button>
            <button type="button" (click)="modalAddEdit.hide()" class="btn btn-danger btn-sm">
              <i class="fa fa-close"></i> Hủy</button>
          </div>
          <!-- /.box-footer -->
        </form>
      </div>
    </div>
  </div>
</div>
