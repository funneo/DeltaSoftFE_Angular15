<div ngDraggable [handle]="myHandle" class="modal fade" bsModal #modalAddEdit="bs-modal" [config]="{backdrop: 'static'}"
  tabindex="-1" role="dialog" aria-labelledby="dialog-static-name" (onHidden)="OnHidden()">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div #myHandle class="modal-header">
        <h4 class="modal-title pull-left">Công việc CANON</h4>
        <button type="button" class="close pull-right" aria-label="Close" (click)="modalAddEdit.hide()">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">
        <form class="form-horizontal" novalidate #addEditForm="ngForm" (ngSubmit)="saveChange(addEditForm)"
          *ngIf="entity">
          <div class="box-body">
            <div class="col-md-8">
              <div class="form-group">
                <label class="col-sm-3 control-label">Khách hàng
                  <span class="error">*</span>
                </label>
                <div class="col-sm-2">
                  <input class="form-control" type="text" name="makh" [(ngModel)]="customerCode" required
                    [readonly]="flagXem" (keydown.enter)="searchCustomer()">
                </div>
                <div class="col-sm-7">
                  <ng-select [items]="listCustomer" name="customercode" required bindLabel="customerName" bindValue="id"
                    [disabled]="flagXem" (change)="changedCustomer($event)" [(ngModel)]="entity.customerId">
                  </ng-select>
                </div>
              </div>
              <div class="form-group">
                <label class="col-sm-3 control-label">JobId
                  <span class="error">*</span>
                </label>
                <div class="col-sm-4">
                  <div class="input-group">
                    <span class="form-control" style="color: red;"><b>{{entity.jobId}}</b></span>
                    <span class="input-group-btn">
                      <button style="height: 28px;" *ngIf=" entity.status<1" type="button"
                        class="btn btn-primary btn-sm " (click)="getJobId()">
                        <i class="fa fa-search"></i></button>
                    </span>
                  </div>
                </div>
              </div>
              <div class="form-group">
                <label class="col-sm-3 control-label">Cung đường
                  <span class="error">*</span>
                </label>
                <div class="col-sm-9">
                  <ng-select name="cungduong" [items]="listRoad" bindLabel="name" bindValue="code"
                    [(ngModel)]="entity.jobName" required title="Chọn cung đường" required>
                  </ng-select>
                </div>
                <!-- <div class="col-sm-9">
                  <input class="form-control" [(ngModel)]="entity.mawB_MBL" type="text" name="mawB_MBL"
                    placeholder="" title="Chọn cung đường..." required [readonly]="flagXem" />
                </div> -->
              </div>

              <div class="form-group">
                <label class="col-sm-3 control-label">Xe vận chuyển
                  <span class="error">*</span>
                </label>
                <div class="col-sm-4">
                  <input class="form-control" [(ngModel)]="entity.jobDescription" type="text" name="cdsnumber"
                    placeholder="" title="Nhập thông tin xe vận chuyển" [readonly]="flagXem" required />
                </div>
                <label class="col-sm-2 control-label">Ngày
                  <span class="error">*</span>
                </label>
                <div class="col-sm-3 date">
                  <input name="ngaytk" type="text" daterangepicker [options]="ngayToKhaiOptions" [(ngModel)]="_cdsDate"
                    class="form-control" (selected)="selectedNgayToKhai($event)"
                    (hideDaterangepicker)="closedNgayToKhai($event)" autocomplete="off" required
                    title="Chọn ngày vận chuyển..." [readonly]="flagXem">
                </div>
              </div>

              <div class="form-group">
                <label class="col-sm-3 control-label">LOT
                  <span class="error">*</span>
                </label>
                <div class="col-sm-4">
                  <select class="form-control" [(ngModel)]="entity.opManEvaluationByCS" name="hawB_HBL"
                    [disabled]="flagXem" required>
                    <option *ngFor="let num of [].constructor(30); let i = index" [value]="i+1">
                      {{ i+1 }}
                    </option>
                  </select>
                </div>
              </div>
              <div class="form-group">
                <label class="col-sm-3 control-label">Số Invoice</label>
                <div class="col-sm-4">
                  <input class="form-control" [(ngModel)]="entity.typeOfServices" type="text" name="invoiceno"
                    title="Số hóa đơn..." [readonly]="flagXem" />
                </div>
                <label class="col-sm-2 control-label">Số Booking</label>
                <div class="col-sm-3">
                  <input class="form-control" [(ngModel)]="entity.placeOfDelivery" type="text" name="bookingNo"
                    title="Số Booking" [readonly]="flagXem" />
                </div>
              </div>

              <div class="form-group">
                <label class="col-sm-3 control-label">Nơi lấy hàng</label>
                <div class="col-sm-4">
                  <input class="form-control" [(ngModel)]="entity.pickupLocation" type="text" name="pickupPlace"
                    title="Nhập thông tin nơi lấy hàng..." [readonly]="flagXem" />
                </div>
                <label class="col-sm-2 control-label">Nơi giao hàng</label>
                <div class="col-sm-3">
                  <input class="form-control" [(ngModel)]="entity.deliveryLocation" type="text" name="deliveryPlace"
                    title="Nhập thông tin nơi giao hàng..." [readonly]="flagXem" />
                </div>
              </div>

              <div class="form-group">
                <label class="col-sm-3 control-label">Ghi chú</label>
                <div class="col-sm-9">
                  <textarea class="form-control textrea-size" [(ngModel)]="entity.noteDone" name="ghichu" rows="3"
                    title="Nhập ghi chú" [readonly]="flagXem"></textarea>
                </div>
              </div>
            </div>
            <div class="col-md-4">
              <div class="form-group">
                <div class="col-sm-6" style="justify-content: flex-end; display: flex;">
                  <button *ngIf="entity.id!=undefined" type="button" class="btn btn-primary btn-sm" (click)="attack()">
                    <i class="fa fa-file"></i></button>
                </div>
              </div>
              <div class="form-group" style="margin-top: 70px">
                <label class="col-sm-5 control-label"> Số Pallets
                  <span class="error">*</span>
                </label>
                <div class="col-sm-7">
                  <input class="form-control so-luong" [(ngModel)]="entity.numberOfPallet" type="number" name="pallets"
                    title="Số lượng pallets" [readonly]="flagXem" required />
                </div>
              </div>

              <div class="form-group">
                <label class="col-sm-5 control-label"> Số kiện
                </label>
                <div class="col-sm-7">
                  <input class="form-control so-luong" [(ngModel)]="entity.numberOfPackage" type="number" name="cartons"
                    title="Số kiện hàng" [readonly]="flagXem" />
                </div>
              </div>

              <div class="form-group">
                <label class="col-sm-5 control-label"> Số cont
                </label>
                <div class="col-sm-7">
                  <input class="form-control so-luong" [(ngModel)]="entity.numberOfCont" type="number" name="containers"
                    title="Số lượng containers" [readonly]="flagXem" />
                </div>
              </div>

              <div class="form-group">
                <label class="col-sm-5 control-label"> Lượng hàng(kg)
                </label>
                <div class="col-sm-7">
                  <input class="form-control so-luong" [(ngModel)]="entity.weight" type="number" name="weight"
                    title="Trọng lượng hàng hóa(kg)" [readonly]="flagXem" />
                </div>
              </div>

              <div class="form-group">
                <label class="col-sm-5 control-label"> Số khối(cbm)
                </label>
                <div class="col-sm-7">
                  <input class="form-control so-luong" [(ngModel)]="entity.volume" type="number" name="volume"
                    title="Số khối hàng hóa (cbm)" [readonly]="flagXem" />
                </div>
              </div>
            </div>
          </div>
          <!-- /.box-body -->
          <div class="row box-footer">
            <div class="col-md-6 text-left">
              <button *ngIf="entity.id" type="button" class="btn btn-info btn-sm" title="Chứng từ đính kèm"
                (click)="showFiles()">
                <i class="fa fa-file-pdf-o" aria-hidden="true"></i> Chứng từ ...
              </button>
            </div>
            <div class="col-md-6 text-right">
              <button *ngIf="!flagXem" type="submit" class="btn btn-primary btn-sm"
                [disabled]="!addEditForm.form.valid || flagSave || entity.jobId?.length<1 || entity.shipmentId<1">
                <i class="fa fa-save"></i> Lưu & thêm mới</button>
              <button type="button" (click)="modalAddEdit.hide()" class="btn btn-danger btn-sm">
                <i class="fa fa-close"></i> Thoát</button>
            </div>
          </div>
          <!-- /.box-footer -->
        </form>
      </div>
    </div>
  </div>
</div>
<modal-attachfile *ngIf="viewAttachFiles" (SaveSuccess)="saveSuccessFile($event)" (CloseModal)="closeModalFile()">
</modal-attachfile>
<modal-shipment-view-search *ngIf="viewSearchJobId" (SaveSuccess)="saveSuccessJobId($event)">
</modal-shipment-view-search>
