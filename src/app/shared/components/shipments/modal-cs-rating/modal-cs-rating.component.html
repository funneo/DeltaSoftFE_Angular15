<div ngDraggable [handle]="myHandle" class="modal fade" bsModal #modalAddEdit="bs-modal" [config]="{backdrop: 'static'}"
  tabindex="-1" role="dialog" aria-labelledby="dialog-static-name" (onHidden)="onHidden()" (onShown)="onShow()">
  <div class="modal-dialog modal-md">
    <div class="modal-content">
      <div #myHandle class="modal-header">
        <h4 class="modal-title pull-left">Đánh giá CS</h4>
        <button type="button" class="close pull-right" aria-label="Close" (click)="modalAddEdit.hide()">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">
        <form class="form-horizontal" novalidate #addEditForm="ngForm" (ngSubmit)="saveChange(addEditForm)"
          *ngIf="entity" #aForm>
          <div class="box-body">
            <div class="form-group">
              <label class="col-sm-3 control-label">Số Debit
                <span class="error">*</span>
              </label>
              <div class="col-sm-9">
                <input type="text" #groupfeename="ngModel" [(ngModel)]="entity.debitNo" required maxlength="255"
                  name="degbitno" class="form-control" placeholder="Debit" focus [readonly]="true" />
                <small [hidden]="groupfeename.valid || (groupfeename.pristine && !addEditForm.submitted)"
                  class="text-danger">
                  Không được để trống và không vượt quá 255 kí tự
                </small>
              </div>
            </div>
            <div class="form-group">
              <label class="col-sm-3 control-label">Mức độ hoàn thành</label>
              <div class="col-sm-4 star">
                <bar-rating name="ratingcs" [(rate)]="_rate" (rateChange)="changedRating($event)" [max]="5"></bar-rating>
              </div>
            </div>
            <div class="form-group">
              <label class="col-sm-3 control-label">Nhận xét</label>
              <div class="col-sm-9">
                <textarea class="form-control textrea-size" #openjobfeedback="ngModel" [(ngModel)]="entity.feedback"
                  name="debitcsfeedback" rows="3" placeholder="Nhận xét"
                  [readonly]="flagXem"></textarea>
                <small [hidden]="openjobfeedback.valid || (openjobfeedback.pristine && !addEditForm.submitted)"
                  class="text-danger">
                  Không được để trống và không vượt quá 400 kí tự
                </small>
              </div>
            </div>
            <div class="form-group">
              <label class="col-sm-3 control-label"></label>
              <div class="col-sm-4">
                <label class="custom-checkbox">
                  <input type="checkbox" [(ngModel)]="entity.status" name="status" />
                  <span class="helping-el"></span>
                  Trạng thái
                </label>
              </div>
            </div>
          </div>
          <!-- /.box-body -->
          <div class="box-footer text-right">
            <button *ngIf="!flagXem" type="submit" class="btn btn-primary btn-sm"
              [disabled]="!addEditForm.form.valid || flagSave || _rate==0">
              <i class="fa fa-save"></i> Lưu</button>
            <button type="button" (click)="modalAddEdit.hide()" class="btn btn-danger btn-sm">
              <i class="fa fa-close"></i> Hủy</button>
          </div>
          <!-- /.box-footer -->
        </form>
      </div>
    </div>
  </div>
</div>
