<div ngDraggable [handle]="myHandle" class="modal fade" bsModal #modaChangedDriver="bs-modal" [config]="{backdrop: 'static'}"
  tabindex="-1" role="dialog" aria-labelledby="dialog-static-name" (onHidden)="OnHidden()">
  <div class="modal-dialog modal-md">
    <div class="modal-content">
      <div #myHandle class="modal-header">
        <h4 class="modal-title pull-left">Thay đổi lái xe thực hiện lệnh</h4>
        <button type="button" class="close pull-right" aria-label="Close" (click)="modaChangedDriver.hide()">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">
        <form class="form-horizontal" novalidate #modaChangedDriver="ngForm" (ngSubmit)="saveChange(modaChangedDriver)"
          *ngIf="1==1">
          <div class="box-body">
            <div class="form-group">
                <label class="col-sm-3 control-label">Lái xe
                  <span class="error">*</span>
                </label>
                <div class="col-sm-9">
                    <ng-select [items]="listUser"  name="driverId" required
                    bindLabel="employeeFullName"
                    bindValue="id"
                    [(ngModel)]="driverId">
                    </ng-select>
                </div>
            </div>
            <div class="form-group">
              <label class="col-sm-3 control-label">Lái xe ghi nhận dầu <span class="error">*</span>
              </label>
              <div class="col-sm-9">
                  <ng-select [items]="listUser"  name="fueldriverId" required
                  bindLabel="employeeFullName"
                  bindValue="id"
                  [(ngModel)]="fuelDriverId">
                  </ng-select>
              </div>
          </div>

          </div>
          <!-- /.box-body -->
          <div class="box-footer text-right">
            <button type="submit" class="btn btn-primary btn-sm"
              [disabled]="!modaChangedDriver.form.valid">
              <i class="fa fa-edit"></i> Chấp nhận</button>
            <button type="button" (click)="hide()" class="btn btn-danger btn-sm">
              <i class="fa fa-close"></i> Hủy</button>
          </div>
          <!-- /.box-footer -->
        </form>
      </div>
    </div>
  </div>
</div>
