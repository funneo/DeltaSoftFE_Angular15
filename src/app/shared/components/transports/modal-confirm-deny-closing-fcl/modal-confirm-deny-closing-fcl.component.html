<div ngDraggable [handle]="myHandle" class="modal fade" bsModal #modalConfirm="bs-modal" [config]="{backdrop: 'static'}"
    tabindex="-1" role="dialog" aria-labelledby="dialog-static-name">
    <div class="modal-dialog modal-md">
        <div class="modal-content">
            <div #myHandle class="modal-header" style="background-color: red; color: white;">
                <h4 class="modal-title pull-left">Từ chối Chốt lệnh vận chuyển FCL</h4>
                <button type="button" class="close pull-right" aria-label="Close" (click)="modalConfirm.hide()">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <form class="form-horizontal">
                    <div class="box-body">
                        <div class="form-group">
                            <label class="col-sm-3 control-label">Lý do</label>
                            <div class="col-sm-9">
                                <textarea type="text" class="form-control" name="feedback" [(ngModel)]="feedback" required> </textarea>
                            </div>
                        </div>
                    </div>
                    <!-- /.box-body -->
                    <div class="box-footer text-right">
                        <button type="button" class="btn btn-warning btn-sm" (click)="click(0)" [disabled]="!feedback || feedback.length < 1">
                            <i class="fa fa-check-o "></i> Sai cung đường, dầu</button>
                        <button type="button" class="btn btn-warning btn-sm" (click)="click(1)" [disabled]="!feedback || feedback.length < 1">
                            <i class="fa fa-check-o"></i> Sai chi phí, tiền vé</button>
                        <button type="button" (click)="modalConfirm.hide()" class="btn btn-danger btn-sm">
                            <i class="fa fa-close"></i> Hủy</button>
                    </div>
                    <!-- /.box-footer -->
                </form>
            </div>
        </div>
    </div>
</div>
