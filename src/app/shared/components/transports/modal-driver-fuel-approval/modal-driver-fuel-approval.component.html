<div ngDraggable [handle]="myHandle" class="modal fade" bsModal #modalAddEdit="bs-modal" [config]="{backdrop: 'static'}"
  tabindex="-1" role="dialog" aria-labelledby="dialog-static-name" (onHidden)="OnHidden()">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div #myHandle class="modal-header">
        <h4 class="modal-title pull-left">{{title}}</h4>
        <button type="button" class="close pull-right" aria-label="Close" (click)="modalAddEdit.hide()">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">
        <form class="form-horizontal" novalidate #addEditForm="ngForm" (ngSubmit)="saveChange(addEditForm)"
          *ngIf="entity">
          <div class="box-body">
            <div class="form-group" *ngIf="!flagNew">
              <label class="col-sm-2 control-label">Số phiếu:</label>
              <div class="col-sm-2 control-label-text-left">
                <span style="font-weight: bold; color: blue;"> {{entity.refNo}}</span>
              </div>
              <label class="col-sm-1 control-label" *ngIf="entity.isLocal">IGAS: </label>
              <div class="col-sm-1" *ngIf="entity.isLocal">
                <input class="form-control" [(ngModel)]="entity.igasCode" name="igasCode"
                [readonly]="flagXem || entity.status>0"/>
                <!-- <span style="font-weight: bold; color: blue;"> {{entity.igasCode}}</span> -->
              </div>
              <label class="col-sm-2 control-label">Ngày:</label>
              <div class="col-sm-2 control-label-text-left">
                <span style="font-weight: bold; color: blue;"> {{entity.createdDate | date:'dd/MM/yyyy'}}</span>
              </div>
              <div class="col-sm-2">
                <button *ngIf="entity.id" type="button" class="btn btn-info btn-sm" title="Chứng từ đính kèm" (click)="showFiles()">
                  <i class="fa fa-file-pdf-o" aria-hidden="true"></i> File đính kèm
                </button>
              </div>
            </div>
            <div class="form-group" *ngIf="entity.isCbt">
              <div class="col-sm-2 control-label">Lệnh vận chuyển
              </div>
              <div class="col-sm-6">
                <span class="form-control" style="font-weight: bold; color: blue;">{{entity.refNoCbt}}</span>
              </div>
            </div>
            <div class="form-group">
              <label class="col-sm-2 control-label"></label>
              <div class="col-sm-4">
                <label class="custom-checkbox">
                  <input type="checkbox" [(ngModel)]="entity.isLocal" name="isLocal" [disabled]="entity.status>0" />
                  <span class="helping-el"></span>
                  Cây dầu Delta
                </label>
              </div>
            </div>
            <div class="form-group" *ngIf="entity.isLocal">
              <label class="col-sm-2 control-label">Kho dầu
                <span class="error">*</span>
              </label>
              <div class="col-sm-10">
                <ng-select name="gasSiteId" [items]="listGasSite" bindLabel="siteName" bindValue="id"
                  [(ngModel)]="entity.gasSiteId" placeholder="Chọn kho dầu" [disabled]="flagXem  || entity.status>0">
                </ng-select>
              </div>
            </div>
            <div class="form-group" *ngIf="!entity.isLocal">
              <label class="col-sm-2 control-label">Nhà cung cấp
                <span class="error">*</span>
              </label>
              <div class="col-sm-10">
                <ng-select name="supplierId" [items]="listSupplier" bindLabel="supplierName" bindValue="id"
                  [(ngModel)]="entity.supplierId" [required]="!entity.isLocal" placeholder="Chọn nhà cung cấp"
                  [disabled]="flagXem  || entity.status>0">
                </ng-select>
              </div>
            </div>
            <div class="form-group">
              <label class="col-sm-2 control-label">Lái xe
                <span class="error">*</span>
              </label>
              <div class="col-sm-3">
                <ng-select name="driverId" [items]="listDriver" bindLabel="employeeFullName" bindValue="id"
                  [(ngModel)]="entity.driverId" (change)="driverChanged($event)" required placeholder="Chọn lái xe"
                  [disabled]="flagXem || (!flagNew && !userLoged.isAdmin)|| entity.isCbt">
                </ng-select>
              </div>
            </div>
            <div class="form-group" *ngIf="entity.type==0">
              <label class="col-sm-2 control-label">Biển kiểm soát</label>
              <div class="col-sm-3">
                <ng-select name="vihicleId" [items]="listVihicle" bindLabel="licensePlates" bindValue="id"
                  [(ngModel)]="entity.vihicleId" (change)="vihicleChanged($event)" placeholder="Chọn biển số xe"
                  [disabled]="flagXem || entity.isCbt">
                </ng-select>
              </div>
              <label class="col-sm-1 control-label">Km đầu</label>
              <div class="col-sm-2">
                <input class="form-control" [(ngModel)]="entity.startKm" type="text" name="startKm" [mask]="mask0"
                  [readonly]="flagXem || entity.status>0" required />
              </div>
              <label class="col-sm-1 control-label">Km cuối</label>
              <div class="col-sm-2">
                <input class="form-control" [(ngModel)]="entity.finishKm" type="text" name="finishKm" [mask]="mask0"
                  [readonly]="flagXem || entity.status>0" required />
              </div>
            </div>
            <div class="form-group">
              <label class="col-sm-2 control-label">Số lượng <span class="error">*</span></label>
              <div class="col-sm-2">
                <input class="form-control" [(ngModel)]="entity.quantity" type="text" name="quantity" [mask]="maskNumber" [allowNegativeNumbers]="true"
                  [readonly]="flagXem || entity.status>0" required />
              </div>
              <label class="col-sm-1 control-label">Giá <span class="error">*</span></label>
              <div class="col-sm-2">
                <input class="form-control" [(ngModel)]="entity.oilPrice" type="text" name="oilPrice" [mask]="mask0"
                  [readonly]="flagXem || entity.status>0" required />
              </div>
              <label class="col-sm-1 control-label" *ngIf="!flagNew && entity.isLocal">Hạn đổ:
              </label>
              <div class="col-sm-3" style="color:blue ;" *ngIf="!flagNew && entity.isLocal">
                <span class="form-control"><b>{{entity.validTime | date:'dd/MM/yyyy HH:mm'}}</b></span>
              </div>
            </div>
            <div class="form-group">
              <label class="col-sm-2 control-label">Ghi chú</label>
              <div class="col-sm-10">
                <textarea class="form-control" [(ngModel)]="entity.note" name="moocLicensePlates" rows="3"
                  placeholder="Nhập ghi chú" [readonly]="flagXem"></textarea>
              </div>
            </div>
            <div class="form-group" *ngIf="entity.status>0">
              <label class="col-sm-2 control-label">Thời gian đổ thực tế:
              </label>
              <div class="col-sm-3" style="color:blue ;">
                <input name="refuelingTimeIgas" type="text" daterangepicker [options]="ngaybatdauOption"
                  [(ngModel)]="entity.refuelingTimeIgas" class="form-control" (selected)="selectedNgaybatdau($event)"
                  (hideDaterangepicker)="closedNgaybatdau($event)" autocomplete="off"
                  [disabled]="flagXem || entity.approved">
              </div>
              <label class="col-sm-2 control-label">S/L thực tế</label>
              <div class="col-sm-1">
                <input class="form-control" [(ngModel)]="entity.quantityIgas" type="text" name="quantityIgas" [mask]="maskNumber"  [allowNegativeNumbers]="true"
                  [readonly]="flagXem || entity.approved"/>
              </div>
              <label class="col-sm-2 control-label">Giá thực tế</label>
              <div class="col-sm-2">
                <input class="form-control" [(ngModel)]="entity.realOilPrice" type="text" [mask]="mask0" name="realOilPrice"
                  [readonly]="flagXem || entity.approved" required />
              </div>
            </div>
          </div>
          <!-- /.box-body -->
          <div class="box-footer text-right">
            <button *ngIf="!flagNew && entity.isLocal && entity.status==0" type="button" (click)="getIgasCode()"
              class="btn btn-success btn-sm">
              <i class="fa fa-check"></i> Xuất phiếu IGAS</button>
            <button *ngIf="!flagNew && entity.status==0 && !entity.isLocal" type="button" class="btn btn-success btn-sm"
                (click)="xuatPhieu()">
              <i class="fa fa-success"></i> Xuất phiếu</button>
            <button *ngIf="entity.status==1 && entity.isLocal" type="button" class="btn btn-warning btn-sm"
              (click)="huyPhieu()">
            <i class="fa fa-success"></i> Hủy phiếu</button>
            <!-- <button *ngIf="entity.status>0 && !entity.isLocal" class="btn btn-primary btn-sm" type="button" (click)="inPhieu()">
              <i class="fa fa-info"></i> In phiếu</button> -->
              <button *ngIf="entity.status>0 && !entity.isLocal" class="btn btn-primary btn-sm" type="button" (click)="print(entity)">
                <i class="fa fa-info"></i> In phiếu</button>
            <button *ngIf="apprved_permission && !entity.approved && entity.status>0" type="button"
              class="btn btn-danger btn-sm" (click)="chotPhieu()">
              <i class="fa fa-ambulance"></i> Chốt dữ liệu</button>
            <button *ngIf="entity.status==1 && !entity.approved" class="btn btn-success btn-sm" type="button"
              (click)="updateIgas()">
              <i class="fa fa-success"></i> Cập nhật Igas</button>
            <button *ngIf="!flagXem && entity.status==0  || userLoged.isAdmin" type="submit" class="btn btn-primary btn-sm"
              [disabled]="!addEditForm.form.valid || flagSave">
              <i class="fa fa-edit"></i> Lưu</button>
            <button type="button" (click)="modalAddEdit.hide()" class="btn btn-danger btn-sm">
              <i class="fa fa-close"></i> Hủy</button>
          </div>
          <!-- /.box-footer -->
        </form>
      </div>
    </div>
  </div>
</div>
<modal-attachfile *ngIf="viewAttachFiles"  (CloseModal)="closeModalFile()">
</modal-attachfile>
<iframe id="printf" name="printf"></iframe>
