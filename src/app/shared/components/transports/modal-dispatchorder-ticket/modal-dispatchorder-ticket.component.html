<div ngDraggable [handle]="myHandle" class="modal fade" bsModal #modalTicket="bs-modal" [config]="{backdrop: 'static'}"
  tabindex="-1" role="dialog" aria-labelledby="dialog-static-name" (onHidden)="OnHidden()">
  <div class="modal-dialog modal-md">
    <div class="modal-content">
      <div #myHandle class="modal-header">
        <h4 class="modal-title pull-left">Chi tiết Vé lượt</h4>
        <button type="button" class="close pull-right" aria-label="Close" (click)="modalTicket.hide()">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">
        <form class="form-horizontal" novalidate #addDetailedForm="ngForm" *ngIf="entity">
          <div class="form-group">
            <label class="col-sm-3 control-label">Mã phí</label>
            <div class="col-sm-3">
              <ng-select name="feeList" (change)="changedFee($event)" [items]="listFee" bindLabel="feeCode"
                bindValue="id" [(ngModel)]="entity.feeId" [clearable]="false" required>
              </ng-select>
            </div>
            <div class="col-sm-6">
              <span class="form-control">{{entity.feeName}}</span>
            </div>
          </div>
          <div class="form-group">
            <label class="col-sm-3 control-label">Trạm soát vé</label>
            <div class="col-sm-9">
              <ng-select name="tollStationList" (change)="changeTollStation($event)" [items]="listTollStation"
                bindLabel="tollStationName" bindValue="id" [(ngModel)]="entity.tollStationId" required>
              </ng-select>
            </div>
          </div>
          <div class="form-group">
            <label class="col-sm-3 control-label">Mẫu số</label>
            <div class="col-sm-9">
              <input class="form-control" [(ngModel)]="entity.patternNumber" type="text" name="patternNumber"
                [readonly]="flagXem" />
            </div>
          </div>
          <div class="form-group">
            <label class="col-sm-3 control-label">Ký hiệu</label>
            <div class="col-sm-9">
              <input class="form-control" [(ngModel)]="entity.symbol" type="text" name="symbol" [readonly]="flagXem" />
            </div>
          </div>
          <div class="form-group">
            <label class="col-sm-3 control-label">Số hóa đơn</label>
            <div class="col-sm-9">
              <input class="form-control" [(ngModel)]="entity.number" type="text" name="number" [readonly]="flagXem" />
            </div>
          </div>
          <div class="form-group">
            <label class="col-sm-3 control-label">Tiền</label>
            <div class="col-sm-9">
              <input type="number" [(ngModel)]="entity.cost" name="cost" min="0" oninput="validity.valid||(value='');"
                class="form-control" focus [readonly]="flagXem" required />
            </div>
          </div>
          <div class="form-group">
            <label class="col-sm-3 control-label">Vat</label>
            <div class="col-sm-9">
              <input type="number" [(ngModel)]="entity.vat" name="vat" min="0" oninput="validity.valid||(value='');"
                class="form-control" focus [readonly]="flagXem" required />
            </div>
          </div>
          <div class="form-group">
            <label class="col-sm-3 control-label">Ghi chú</label>
            <div class="col-sm-9">
              <textarea class="form-control" [(ngModel)]="entity.note" name="note" rows="3" placeholder="Nhập ghi chú"
                [readonly]="flagXem"></textarea>
            </div>
          </div>
          <!-- /.box-body -->
          <div class="box-footer text-right">
            <button *ngIf="!flagXem" [disabled]="!addDetailedForm.form.valid " type="button"
              class="btn btn-primary btn-sm" (click)="saveChange(addDetailedForm)">
              <i class="fa fa-save"></i> Lưu</button>
            <button type="button" (click)="modalTicket.hide()" class="btn btn-danger btn-sm">
              <i class="fa fa-close"></i> Hủy</button>
          </div>
          <!-- /.box-footer -->
        </form>
      </div>
    </div>
  </div>
</div>
