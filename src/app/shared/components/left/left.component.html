<aside class="main-sidebar">
  <!-- style="background-color: cadetblue;" -->
  <!-- sidebar: style can be found in sidebar.less -->
  <section class="sidebar">
    <!-- sidebar menu: : style can be found in sidebar.less -->
    <ul class="sidebar-menu">
      <li>
        <a routerLink="/main/home" routerLinkActive="active">
          <i class="fa fa-th"></i> <span>Trang chủ</span>
        </a>
      </li>
      <li *ngFor="let item of functions" [class]="item.children.length>0?'treeview': ''">
        <a href="#" *ngIf="item.children.length > 0">
          <i class="fa {{item.cssClass}}" [style.color]="item.color? item.color: '#444'"></i> <span>
            {{item.name}}</span>
          <span class="pull-right-container">
            <i class="fa fa-angle-left pull-right"></i>
          </span>
        </a>
        <ul class="treeview-menu" *ngIf="item.children.length > 0">
          <li *ngFor="let subItem of item.children"><a routerLink="{{subItem.url}}" routerLinkActive="active"><i
                class="fa {{subItem.cssClass}}"
                [style.color]="subItem.color? subItem.color: '#444'"></i><span>{{subItem.name}}</span> </a></li>
        </ul>
        <a *ngIf="!(item.children.length > 0)" routerLink="{{item.url}}" routerLinkActive="active"><i
            class="fa {{item.cssClass}}" [style.color]="item.color? item.color: '#444'"></i> <span>
            {{item.name}}</span></a>
      </li>
    </ul>
  </section>
  <!-- /.sidebar -->
</aside>
