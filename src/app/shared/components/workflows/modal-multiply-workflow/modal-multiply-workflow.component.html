<div ngDraggable [handle]="myHandle" class="modal fade" bsModal #modalMultiply="bs-modal" [config]="{backdrop: 'static'}"
    tabindex="-1" role="dialog" aria-labelledby="dialog-static-name">
    <div class="modal-dialog modal-sm">
        <div class="modal-content">
            <div #myHandle class="modal-header">
                <h4 class="modal-title pull-left">Nhân việc</h4>
                <button type="button" class="close pull-right" aria-label="Close" (click)="modalMultiply.hide()">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <form class="form-horizontal">
                    <div class="box-body">
                        <div class="form-group">
                            <label class="col-sm-3 control-label">Số lần</label>
                            <div class="col-sm-9">
                                <input type="number" class="form-control text-right" name="multi" [(ngModel)]="multiValue"/>
                            </div>
                        </div>
                    </div>
                    <!-- /.box-body -->
                    <div class="box-footer text-right">
                        <button type="button" class="btn btn-success btn-sm" (click)="multiply()">
                            <i class="fa fa-times "></i> Nhân việc</button>
                        <button type="button" (click)="modalMultiply.hide()" class="btn btn-danger btn-sm">
                            <i class="fa fa-close"></i> Hủy</button>
                    </div>
                    <!-- /.box-footer -->
                </form>
            </div>
        </div>
    </div>
</div>
