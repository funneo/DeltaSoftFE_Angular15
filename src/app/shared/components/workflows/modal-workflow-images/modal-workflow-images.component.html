<div ngDraggable [handle]="myHandle" class="modal fade" bsModal #modalImagePod="bs-modal"
  [config]="{backdrop: 'static'}" tabindex="-1" role="dialog" aria-labelledby="dialog-static-name"
  (onHidden)="OnHidden()">
  <div class="modal-dialog modal-md">
    <div class="modal-content">
      <div #myHandle class="modal-header">
        <h4 class="modal-title pull-left">Hình ảnh hiện trường/POD</h4>
        <button type="button" class="close pull-right" aria-label="Close" (click)="modalImagePod.hide()">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">
        <form class="form-horizontal">
          <div>
            <tabset>
              <tab heading="Hình ảnh hiện trường">
                <div class="box-body">
                  <div class="form-group">
                    <div class="col-sm-6">
                      <button *ngIf="isOpMan" type="button" class="btn btn-sm btn-success" (click)="newAttachFile()">
                        <i class="fa fa-plus" aria-hidden="true"></i> Thêm mới
                    </button>
                        <button type="button" class="btn btn-sm btn-info" (click)="viewAll()">
                          <i class="fa fa-plus" aria-hidden="true"></i> Xem ảnh
                      </button>
                    </div>
                </div>
                <div class="form-group">
                    <div class="table-responsive" style="padding-left:15px; padding-right:15px">
                        <table class="table table-bordered table-striped table-hover">
                            <thead>
                                <tr>
                                    <th>Nội dung</th>
                                    <th>Tên tập tin</th>
                                    <th *ngIf="isOpMan"></th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr *ngFor="let item of listImage; let i=index;">
                                    <td style="width:20%">
                                        <input class="form-control" [(ngModel)]="item.title" type="text"
                                            name="title{{i}}" [disabled]="item.id!=undefined" />
                                    </td>
                                    <td><a (click)="clickLink(item)">{{item.fileName}}</a></td>
                                    <td style="width:100px" *ngIf="isOpMan">
                                        <input style="display: none" type="file" class="custom-file-input"
                                            id="customFile" #fileUpload (change)="onFileChanged($event,item)"
                                            accept=".jpg,.png,.gif,.pdf,.xls,.xlsx,.doc,.docx,.ppt,.pptx">
                                        <button type="button" class="btn btn-sm btn-primary"
                                            (click)="fileUpload.click()"
                                            [disabled]="item.title?.length<1">
                                            <i class="fa fa-upload" aria-hidden="true"></i>
                                        </button>
                                        <button type="button" class="btn btn-sm btn-danger"
                                            (click)="deleteFile(item)">
                                            <i class="fa fa-eraser" aria-hidden="true"></i>
                                        </button>
                                </tr>
                                <tr *ngIf="listImage?.length == 0">
                                    <td colspan="100%">Không có đính kèm nào được tìm thấy!</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                </div>
              </tab>
              <tab heading="POD">
                <div class="form-group">
                  <div class="table-responsive" style="padding-left:15px; padding-right:15px">
                    <table class="table table-bordered table-striped table-hover">
                      <thead>
                        <tr>
                          <th>Nội dung</th>
                          <th>Tên file</th>
                        </tr>
                      </thead>
                      <tbody>
                        <tr *ngFor="let item of listPod; let i=index;">
                          <td>
                            {{item.title}}
                          </td>
                          <td style="width:50%"><a (click)="clickLink(item)">{{item.fileName}}</a></td>
                        </tr>
                        <tr *ngIf="listPod?.length == 0">
                          <td colspan="100%">Không có bản ghi nào được tìm thấy!</td>
                        </tr>
                      </tbody>
                    </table>
                  </div>
                </div>
              </tab>
            </tabset>
          </div>
          <!-- /.box-body -->
          <div class="text-right modal-footer">
            <button type="button" (click)="hide()" class="btn btn-danger btn-sm">
              <i class="fa fa-close"></i> Hủy</button>
          </div>
          <!-- /.box-footer -->
        </form>
      </div>
    </div>
  </div>
</div>
