<div ngDraggable [handle]="myHandle" class="modal fade" bsModal #modalOpManAssigning="bs-modal" [config]="{backdrop: 'static'}"
  tabindex="-1" role="dialog" aria-labelledby="dialog-static-name" (onHidden)="OnHidden()">
  <div class="modal-dialog modal-md">
    <div class="modal-content">
      <div #myHandle class="modal-header">
        <h4 class="modal-title pull-left">Giao việc</h4>
        <button type="button" class="close pull-right" aria-label="Close" (click)="modalOpManAssigning.hide()">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">
        <form class="form-horizontal" novalidate #modalOpManAssigning="ngForm" (ngSubmit)="saveChange(modalOpManAssigning)"
          *ngIf="1==1">
          <div class="box-body">
            <div class="form-group">
                <label class="col-sm-3 control-label">Người thực hiện
                  <span class="error">*</span>
                </label>
                <div class="col-sm-9">
                    <ng-select [items]="listUser"  name="userId" required
                    bindLabel="employeeFullName" 
                    bindValue="id" 
                    [(ngModel)]="userId">
                    </ng-select>
                </div>
            </div>
            
            <div class="form-group">
              <label class="col-sm-3 control-label">Ghi chú</label>
              <div class="col-sm-9">
                <textarea class="form-control textrea-size" [(ngModel)]="notes" name="jobdescription" rows="4"
                  placeholder="Nhập nội ghi chú"></textarea>
              </div>
            </div>
          </div>
          <!-- /.box-body -->
          <div class="box-footer text-right">
            <button type="submit" class="btn btn-primary btn-sm"
              [disabled]="!modalOpManAssigning.form.valid">
              <i class="fa fa-edit"></i> Giao việc</button>
            <button type="button" (click)="hide()" class="btn btn-danger btn-sm">
              <i class="fa fa-close"></i> Hủy</button>
          </div>
          <!-- /.box-footer -->
        </form>
      </div>
    </div>
  </div>
</div>
