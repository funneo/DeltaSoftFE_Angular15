<div ngDraggable [handle]="myHandle" class="modal fade" bsModal #modaTimeKeeping="bs-modal"
    [config]="{backdrop: 'static'}" tabindex="-1" role="dialog" aria-labelledby="dialog-static-name"
    (onHidden)="OnHidden()">
    <div class="modal-dialog modal-md">
        <div class="modal-content">
            <div #myHandle class="modal-header">
                <h4 class="modal-title pull-left">{{title}}</h4>
                <button type="button" class="close pull-right" aria-label="Close" (click)="modaTimeKeeping.hide()">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <form class="form-horizontal" novalidate #addDetailedForm="ngForm"
                    (ngSubmit)="saveChanged(addDetailedForm)">
                    <div class="form-group">
                        <label class="col-sm-3 control-label">Ghi chú</label>
                        <div class="col-sm-9">
                            <textarea class="form-control" [(ngModel)]="note" name="note" rows="3"
                                placeholder="Nhập ghi chú"></textarea>
                        </div>
                    </div>
                    <!-- /.box-body -->
                    <div class="box-footer text-right">
                        <button type="submit" class="btn btn-primary btn-sm">
                            <i class="fa fa-save"></i> Đồng ý</button>
                        <button type="button" (click)="modaTimeKeeping.hide()" class="btn btn-danger btn-sm">
                            <i class="fa fa-close"></i> Hủy</button>
                    </div>
                    <!-- /.box-footer -->
                </form>
            </div>
        </div>
    </div>
</div>
