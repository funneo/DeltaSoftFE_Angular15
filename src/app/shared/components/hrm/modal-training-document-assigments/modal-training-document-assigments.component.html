<div ngDraggable [handle]="myHandle" class="modal fade" bsModal #modalAddEdit="bs-modal" [config]="{backdrop: 'static'}"
    tabindex="-1" role="dialog" aria-labelledby="dialog-static-name" (onHidden)="OnHidden()">
    <div class="modal-dialog modal-md">
        <div class="modal-content">
            <div #myHandle class="modal-header">
                <h4 class="modal-title pull-left">Chuyển quyền duyệt tài liệu</h4>
                <button type="button" class="close pull-right" aria-label="Close" (click)="modalAddEdit.hide()">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <form class="form-horizontal" novalidate #addEditForm="ngForm" (ngSubmit)="saveChange(addEditForm)"
                    *ngIf="entity">
                    <div class="box-body">
                        <div class="form-group">
                            <label class="col-sm-3 control-label">Lý do
                                <span class="error">*</span>
                            </label>
                            <div class="col-sm-9">
                                <textarea class="form-control" [(ngModel)]="reason" rows="2" name="reason"
                                    required placeholder="Nhập lý do chuyển quyền duyệt tài liệu"></textarea>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="col-sm-3 control-label">Người duyệt
                                <span class="error">*</span>
                            </label>
                            <div class="col-sm-9">
                                <ng-select name="assigneeId" [items]="listApproval" bindLabel="userName"
                                    bindValue="userId" [(ngModel)]="entity.assigneeId" required
                                    placeholder="Chọn người duỵet">
                                </ng-select>
                            </div>
                        </div>
                    </div>
                    <!-- /.box-body -->
                    <div class="box-footer text-right">
                        <button  type="submit" class="btn btn-primary btn-sm"
                            [disabled]="!addEditForm.form.valid || flagSave  ">
                            <i class="fa fa-edit"></i> Lưu</button>
                        <button type="button" (click)="modalAddEdit.hide()" class="btn btn-danger btn-sm">
                            <i class="fa fa-close"></i> Hủy</button>
                    </div>
                    <!-- /.box-footer -->
                </form>
            </div>
        </div>
    </div>
</div>
