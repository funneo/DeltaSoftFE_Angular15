<div ngDraggable [handle]="myHandle" class="modal fade" bsModal #modalAddEdit="bs-modal" [config]="{backdrop: 'static'}"
  tabindex="-1" role="dialog" aria-labelledby="dialog-static-name" (onHidden)="OnHidden()">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div #myHandle class="modal-header">
        <h4 class="modal-title pull-left">Chi nhánh</h4>
        <button type="button" class="close pull-right" aria-label="Close" (click)="modalAddEdit.hide()">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">
        <form class="form-horizontal" novalidate #addEditForm="ngForm" (ngSubmit)="saveChange(addEditForm)"
          *ngIf="entity">
              <div class="box-body">
                <div class="form-group">
                  <label class="col-sm-2 control-label">Tên chi nhánh
                    <span class="error">*</span>
                  </label>
                  <div class="col-sm-10">
                    <input type="text" #tennhomquyen="ngModel" [(ngModel)]="entity.branchName" required maxlength="255"
                      name="tengp" class="form-control" placeholder="Nhập tên chi nhánh" focus [readonly]="flagXem" />
                    <small [hidden]="tennhomquyen.valid || (tennhomquyen.pristine && !addEditForm.submitted)"
                      class="text-danger">
                      Tên không được để trống và không vượt quá 255 kí tự
                    </small>
                  </div>
                </div>
                <div class="form-group">
                  <label class="col-sm-2 control-label">Mã chi nhánh
                    <span class="error">*</span>
                  </label>
                  <div class="col-sm-4">
                    <input type="text" [(ngModel)]="entity.branchCode" maxlength="255" name="code"
                      class="form-control" placeholder="Mã chi nhánh" [readonly]="flagXem" required />
                  </div>
                </div>
                <div class="form-group">
                  <label class="col-sm-2 control-label">Địa chỉ</label>
                  <div class="col-sm-10">
                    <input type="text" [(ngModel)]="entity.address" maxlength="255" name="diachi"
                      class="form-control" placeholder="Đại chỉ" [readonly]="flagXem" />
                  </div>
                </div>
                <div class="form-group">
                  <label class="col-sm-2 control-label">Điện thoại</label>
                  <div class="col-sm-4">
                    <input type="text" [(ngModel)]="entity.telNo" maxlength="255" name="soDienThoai"
                      class="form-control" placeholder="Điện thoại" [readonly]="flagXem" />
                  </div>
                </div>
                <div class="form-group">
                  <label class="col-sm-2 control-label">Tọa độ x</label>
                  <div class="col-sm-4">
                    <input type="number" [(ngModel)]="entity.longitude" name="toaDoX" class="form-control"
                      placeholder="Tọa độ x" [readonly]="flagXem" />
                  </div>
                  <label class="col-sm-2 control-label">Tọa độ y</label>
                  <div class="col-sm-4">
                    <input type="number" [(ngModel)]="entity.latitude" name="toaDoY" class="form-control"
                      placeholder="Tọa độ y" [readonly]="flagXem" />
                  </div>
                </div>
                <div class="form-group">
                  <label class="col-sm-2 control-label">Ghi chú</label>
                  <div class="col-sm-10">
                    <textarea class="form-control textrea-size" [(ngModel)]="entity.note" name="ghichu" rows="5"
                      placeholder="Nhập ghi chú" [readonly]="flagXem"></textarea>
                  </div>
                </div>
                <div class="form-group">

                  <label class="col-sm-2 control-label"></label>
                  <div class="col-sm-5">
                    <label class="custom-checkbox">
                      <input type="checkbox" [(ngModel)]="entity.status" name="status" />
                      <span class="helping-el"></span>
                      Trạng thái
                    </label>
                  </div>
                </div>
              </div>
          <!-- /.box-body -->
          <div class="box-footer text-right">
            <button *ngIf="!flagXem" type="submit" class="btn btn-primary btn-sm"
              [disabled]="!addEditForm.form.valid || flagSave">
              <i class="fa fa-save"></i> Lưu</button>
            <button type="button" (click)="modalAddEdit.hide()" class="btn btn-danger btn-sm">
              <i class="fa fa-close"></i> Hủy</button>
          </div>
          <!-- /.box-footer -->
        </form>
      </div>
    </div>
  </div>
</div>
