<div ngDraggable [handle]="myHandle" class="modal fade" bsModal #modalAddEdit="bs-modal" [config]="{backdrop: 'static'}"
  tabindex="-1" role="dialog" aria-labelledby="dialog-static-name" (onHidden)="OnHidden()">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div #myHandle class="modal-header">
        <h4 class="modal-title pull-left">Thông tin công việc kiểm tra phương tiện</h4>
        <button type="button" class="close pull-right" aria-label="Close" (click)="modalAddEdit.hide()">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">
        <form class="form-horizontal" novalidate #addEditForm="ngForm" (ngSubmit)="saveChange(addEditForm)"
          *ngIf="entity">
          <div class="box-body">
            <div class="form-group">
              <label class="col-sm-3 control-label">Tên công việc
                <span class="error">*</span>
              </label>
              <div class="col-sm-9">
                <input type="text" #jobName="ngModel" [(ngModel)]="entity.jobName" required  name="jobName"
                  class="form-control" rows="3" placeholder="Nhập tên công việc" focus [readonly]="flagXem"/>
                <small [hidden]="jobName.valid || (jobName.pristine && !addEditForm.submitted)"
                  class="text-danger">
                  Tên công việc không được để trống và không vượt quá 255 kí tự
                </small>
              </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">Ghi chú
                </label>
                <div class="col-sm-9">
                  <textarea  [(ngModel)]="entity.note"  rows="2" name="diachi"
                    class="form-control" placeholder="Nhập ghi chú" focus [readonly]="flagXem" ></textarea>
                </div>
            </div>
            <div class="form-group">
              <label class="col-sm-3 control-label">Loại hình
              </label>

                  <div class="col-sm-4">
                    <label class="custom-checkbox" style="padding-top: 7px;">
                      <input type="checkbox" [(ngModel)]="entity.isFrequent" name="isFrequent" />
                      <span class="helping-el"></span>
                      Kiểm tra thường xuyên
                    </label>
                  </div>
                  <div class="col-sm-4">
                    <label class="custom-checkbox"style="padding-top: 7px;">
                      <input type="checkbox" [(ngModel)]="entity.isPeriodic" name="isPeriodic" />
                      <span class="helping-el"></span>
                      Kiểm tra định kỳ
                    </label>
                  </div>

          </div>
          <div class="form-group">
            <label for="inputEmail3" class="col-sm-3 control-label">Thứ tự</label>
            <div class="col-sm-2">
              <input type="number" #displayOrder="ngModel" [(ngModel)]="entity.sortOrder" required
                name="displayOrder" class="form-control" placeholder="Nhập thứ tự hiển thị"
                [readonly]="flagXem" />
              <small [hidden]="displayOrder.valid || (displayOrder.pristine && !addEditForm.submitted)"
                class="text-danger">
                Bạn phải nhập thứ tự
              </small>
            </div>
          </div>
          <div class="form-group">
            <label class="col-sm-3 control-label"></label>
            <div class="col-sm-9">
                <label class="custom-checkbox">
                  <input type="checkbox" [(ngModel)]="entity.actived" name="status" />
                  <span class="helping-el"></span>
                  Kích hoạt
                </label>
            </div>
          </div>

          </div>
          <!-- /.box-body -->
          <div class="box-footer text-right">
            <button *ngIf="!flagXem" type="submit" class="btn btn-primary btn-sm"
              [disabled]="!addEditForm.form.valid || flagSave">
              <i class="fa fa-save"></i> Lưu</button>
            <button type="button" (click)="modalAddEdit.hide()" class="btn btn-danger btn-sm">
              <i class="fa fa-close"></i> Hủy</button>
          </div>
          <!-- /.box-footer -->
        </form>
      </div>
    </div>
  </div>
</div>
