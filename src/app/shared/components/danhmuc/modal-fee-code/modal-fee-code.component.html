<div bsModal #modalAddEdit="bs-modal" class="modal fade" tabindex="-1" role="dialog" aria-labelledby="myLargeModalLabel"
  aria-hidden="true" (onHidden)="onHidden()" [config]="{backdrop: 'static'}">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <button type="button" class="close" (click)="modalAddEdit.hide()" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>
        <h4 class="modal-title">{{entity?.id ? (flagXem ? 'Xem chi tiết' : 'Cập nhật') : 'Thêm mới'}} Phí Cấp 3 (Chi tiết)</h4>
      </div>
      <form #aForm="ngForm" (ngSubmit)="saveChange(aForm)" *ngIf="entity">
        <div class="modal-body">
          <div class="row">
            <!-- Left Column -->
            <div class="col-md-6">
              <div class="form-group">
                <label>Lĩnh vực (Cấp 1) <span class="text-danger">(*)</span></label>
                <ng-select name="parentId1" [items]="listParentLvl1" bindLabel="feeName" bindValue="id"
                  [(ngModel)]="_selectedParentLvl1" (change)="onParentLvl1Change($event)" required [readonly]="flagXem">
                  <ng-template ng-option-tmp let-item="item">
                    {{item.feeCode}} - {{item.feeName}}
                  </ng-template>
                </ng-select>
              </div>

              <div class="form-group">
                <label>Nhóm (Cấp 2) <span class="text-danger">(*)</span></label>
                <ng-select name="parentId2" [items]="listParentLvl2" bindLabel="feeName" bindValue="id"
                  [(ngModel)]="_selectedParentLvl2" (change)="onParentLvl2Change($event)" required [readonly]="flagXem">
                  <ng-template ng-option-tmp let-item="item">
                    {{item.feeCode}} - {{item.feeName}}
                  </ng-template>
                </ng-select>
              </div>

              <div class="form-group">
                <label>Mã phí <span class="text-danger">(*)</span></label>
                <input type="text" name="feeCode" class="form-control" [(ngModel)]="entity.feeCode" #feeCode="ngModel"
                  required [readonly]="entity.id || flagXem">
              </div>

              <div class="form-group">
                <label>Tên phí (VN) <span class="text-danger">(*)</span></label>
                <input type="text" name="feeName" class="form-control" [(ngModel)]="entity.feeName" #feeName="ngModel"
                  required [readonly]="flagXem">
              </div>

              <div class="form-group">
                <label>Tên phí (EN)</label>
                <input type="text" name="feeNameEnglish" class="form-control" [(ngModel)]="entity.feeNameEnglish"
                  [readonly]="flagXem">
              </div>
            </div>

            <!-- Right Column -->
            <div class="col-md-6">
              <div class="form-group">
                <label>Nhóm phí thanh toán</label>
                <ng-select name="paymentFeeGroupId" [items]="listGroupPayment" bindLabel="groupName" bindValue="id"
                  [(ngModel)]="entity.paymentFeeGroupId" [readonly]="flagXem">
                </ng-select>
              </div>

              <div class="form-group">
                <label>Nhóm phí doanh thu</label>
                <ng-select name="revenueFeeGroupId" [items]="listGroupRevenue" bindLabel="groupName" bindValue="id"
                  [(ngModel)]="entity.revenueFeeGroupId" [readonly]="flagXem">
                </ng-select>
              </div>

              <div class="row">
                <div class="col-md-6">
                  <div class="form-group">
                    <label>Tài khoản nợ</label>
                    <input type="text" name="debitAccount" class="form-control" [(ngModel)]="entity.debitAccount" [readonly]="flagXem">
                  </div>
                </div>
                <div class="col-md-6">
                  <div class="form-group">
                    <label>Tài khoản có</label>
                    <input type="text" name="creditAccount" class="form-control" [(ngModel)]="entity.creditAccount" [readonly]="flagXem">
                  </div>
                </div>
              </div>

              <div class="form-group">
                <label>Ánh xạ phí cũ (Chọn nhiều)</label>
                <ng-select name="mappingFeeIds" [items]="listFeeOld" bindValue="id" [multiple]="true"
                  [(ngModel)]="_selectedFeeOldIds" [readonly]="flagXem" [searchFn]="customSearch">
                  <ng-template ng-label-tmp let-item="item">
                    {{item.feeCode}}
                  </ng-template>
                  <ng-template ng-option-tmp let-item="item">
                    {{item.feeCode}} - {{item.feeName}}
                  </ng-template>
                </ng-select>
              </div>

              <div class="form-group">
                <label>Ghi chú</label>
                <textarea name="notes" class="form-control" rows="2" [(ngModel)]="entity.notes"
                  [readonly]="flagXem"></textarea>
              </div>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-default" (click)="modalAddEdit.hide()">Đóng</button>
          <button type="submit" class="btn btn-primary" *ngIf="!flagXem" [disabled]="!aForm.form.valid || flagSave">Lưu lại</button>
        </div>
      </form>
    </div>
  </div>
</div>
