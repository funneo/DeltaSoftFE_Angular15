<div ngDraggable [handle]="myHandle" class="modal fade" bsModal #modalAddEdit="bs-modal" [config]="{backdrop: 'static'}"
    tabindex="-1" role="dialog" aria-labelledby="dialog-static-name" (onHidden)="OnHidden()">
    <div class="modal-dialog modal-md">
        <div class="modal-content">
            <div #myHandle class="modal-header">
                <h4 class="modal-title pull-left">Ngân hàng</h4>
                <button type="button" class="close pull-right" aria-label="Close" (click)="modalAddEdit.hide()">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <form class="form-horizontal" novalidate #addEditForm="ngForm" (ngSubmit)="saveChange(addEditForm)"
                    *ngIf="entity">
                    <div class="box-body">
                        <div class="form-group">
                            <label class="col-sm-3 control-label">Tên đầy đủ
                                <span class="error">*</span>
                            </label>
                            <div class="col-sm-9">
                                <input type="text" #fullName="ngModel" [(ngModel)]="entity.fullName" required
                                    maxlength="255" name="fullName" class="form-control" placeholder="Nhập tên đầy đủ"
                                    focus [readonly]="flagXem" />
                                <small [hidden]="fullName.valid || (fullName.pristine && !addEditForm.submitted)"
                                    class="text-danger">
                                    Tên đầy đủ không được để trống và không vượt quá 255 ký tự
                                </small>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="col-sm-3 control-label">Tên viết tắt</label>
                            <div class="col-sm-9">
                                <input type="text" [(ngModel)]="entity.shortName" name="shortName" class="form-control"
                                    placeholder="Nhập tên viết tắt" maxlength="50" [readonly]="flagXem" />
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="col-sm-3 control-label">Mã CK</label>
                            <div class="col-sm-5">
                                <input type="text" [(ngModel)]="entity.stockCode" name="stockCode"
                                    class="form-control text-uppercase" placeholder="Mã chứng khoán" maxlength="10"
                                    [readonly]="flagXem" />
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="col-sm-3 control-label">Nhóm NH</label>
                            <div class="col-sm-9">
                                <input type="text" [(ngModel)]="entity.bankGroup" name="bankGroup" class="form-control"
                                    placeholder="Nhóm ngân hàng" maxlength="100" [readonly]="flagXem" />
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="col-sm-3 control-label"></label>
                            <div class="col-sm-4">
                                <label class="custom-checkbox">
                                    <input type="checkbox" [(ngModel)]="entity.status" name="status" />
                                    <span class="helping-el"></span>
                                    Trạng thái
                                </label>
                            </div>
                        </div>
                    </div>
                    <!-- /.box-body -->
                    <div class="box-footer text-right">
                        <button *ngIf="!flagXem" type="submit" class="btn btn-primary btn-sm"
                            [disabled]="!addEditForm.form.valid || flagSave">
                            <i class="fa fa-save"></i> Lưu</button>
                        <button type="button" (click)="modalAddEdit.hide()" class="btn btn-danger btn-sm">
                            <i class="fa fa-close"></i> Hủy</button>
                    </div>
                    <!-- /.box-footer -->
                </form>
            </div>
        </div>
    </div>
</div>
