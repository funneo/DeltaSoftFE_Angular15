<div ngDraggable [handle]="myHandle" class="modal fade" bsModal #modalAddEdit="bs-modal" [config]="{backdrop: 'static'}"
  tabindex="-1" role="dialog" aria-labelledby="dialog-static-name" (onHidden)="OnHidden()">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div #myHandle class="modal-header">
        <h4 class="modal-title pull-left">Trung chuyển giữa 2 cảng</h4>
        <button type="button" class="close pull-right" aria-label="Close" (click)="modalAddEdit.hide()">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">
        <form class="form-horizontal" novalidate #addEditForm="ngForm" (ngSubmit)="saveChange(addEditForm)"
          *ngIf="entity">
          <div class="box-body">
            <div class="form-group">
              <label class="col-sm-3 control-label">Từ Cảng
                <span class="error">*</span>
              </label>
              <div class="col-sm-9">
                <ng-select [items]="listPorts" name="fromOd" bindLabel="name"
                  bindValue="id" [(ngModel)]="entity.fromPortsId"  required>
                </ng-select>
              </div>
            </div>
            <div class="form-group">
              <label class="col-sm-3 control-label">Đến Cảng
                <span class="error">*</span>
              </label>
              <div class="col-sm-9">
                <ng-select [items]="listPorts" name="toId" bindLabel="name"
                  bindValue="id" [(ngModel)]="entity.toPortsId" required>
                </ng-select>
              </div>
            </div>
            
            <div class="form-group">
              <label class="col-sm-3 control-label">Khoảng cách
                <span class="error">*</span>
              </label>
              <div class="col-sm-2">
                <input type="number" [(ngModel)]="entity.km" name="distance" class="form-control"
                 [readonly]="flagXem" required />
              </div>
            </div>
            <div class="form-group">
              <label class="col-sm-3 control-label"></label>
              <div class="col-sm-4">
                <label class="custom-checkbox">
                  <input type="checkbox" [(ngModel)]="entity.checked" name="checked" />
                  <span class="helping-el"></span>
                  Chuyển duyệt
                </label>
              </div>
            </div>
          </div>
          <!-- /.box-body -->
          <div class="box-footer text-right">
              <button *ngIf="hasPermissionApproved && entity.status ==1" type="button" (click)="accept(true)"
              class="btn btn-success btn-sm">
              <i class="fa fa-check"></i> Duyệt</button>
            <button *ngIf="hasPermissionApproved  && entity.status==1 " type="button" (click)="accept(false)"
              class="btn btn-warning btn-sm" >
              <i class="fa fa-exclamation-triangle"></i> Từ chối</button>
            <button *ngIf="!flagXem" type="submit" class="btn btn-primary btn-sm"
              [disabled]="!addEditForm.form.valid || flagSave || entity.status>0">
              <i class="fa fa-save"></i> Lưu</button>
            <button type="button" (click)="modalAddEdit.hide()" class="btn btn-danger btn-sm">
              <i class="fa fa-close"></i> Hủy</button>
          </div>
          <!-- /.box-footer -->
        </form>
      </div>
    </div>
  </div>
</div>
