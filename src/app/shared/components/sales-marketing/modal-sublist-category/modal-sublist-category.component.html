<div ngDraggable [handle]="myHandle" class="modal fade" bsModal #modalAddEdit="bs-modal" [config]="{backdrop: 'static'}"
  tabindex="-1" role="dialog" aria-labelledby="dialog-static-name" (onHidden)="OnHidden()">
  <div class="modal-dialog modal-md">
    <div class="modal-content">
      <div #myHandle class="modal-header">
        <h4 class="modal-title pull-left">Danh mục Sales-Marketing</h4>
        <button type="button" class="close pull-right" aria-label="Close" (click)="modalAddEdit.hide()">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">
        <form class="form-horizontal" novalidate #addEditForm="ngForm" (ngSubmit)="saveChange(addEditForm)"
          *ngIf="entity">
          <div class="box-body">
            <div class="form-group">
              <label class="col-sm-3 control-label">Loại danh mục <span class="error">*</span></label>
              <div class="col-sm-9">
                <ng-select [items]="listType"  name="listType" [disabled]="flagXem" required
                    bindLabel="text"
                    bindValue="id"
                    [(ngModel)]="entity.type">
                </ng-select>
              </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label">Ngôn ngữ <span class="error">*</span></label>
                <div class="col-sm-3">
                  <ng-select [items]="listLanguages"  name="listLanguages" [disabled]="flagXem" required
                      bindLabel="text"
                      bindValue="id"
                      [(ngModel)]="entity.languages">
                  </ng-select>
                </div>
              </div>
            <div class="form-group">
              <label class="col-sm-3 control-label">Nội dung
                <span class="error">*</span>
              </label>
              <div class="col-sm-9">
                <textarea #tennhomquyen="ngModel" [(ngModel)]="entity.name" rows="2" required maxlength="4000" name="categoryname"
                  class="form-control" [rows]="10" focus [readonly]="flagXem"></textarea>
                <small [hidden]="tennhomquyen.valid || (tennhomquyen.pristine && !addEditForm.submitted)"
                  class="text-danger">
                  Nội dung không được để trống và không vượt quá 4000 kí tự
                </small>
              </div>
            </div>
          </div>
          <!-- /.box-body -->
          <div class="box-footer text-right">
            <button *ngIf="!flagXem" type="submit" class="btn btn-primary btn-sm"
              [disabled]="!addEditForm.form.valid || flagSave">
              <i class="fa fa-save"></i> Lưu</button>
            <button type="button" (click)="modalAddEdit.hide()" class="btn btn-danger btn-sm">
              <i class="fa fa-close"></i> Hủy</button>
          </div>
          <!-- /.box-footer -->
        </form>
      </div>
    </div>
  </div>
</div>
