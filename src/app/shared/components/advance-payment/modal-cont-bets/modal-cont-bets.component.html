<div ngDraggable [handle]="myHandle" class="modal fade" bsModal #modalAddEdit="bs-modal" [config]="{backdrop: 'static'}"
  tabindex="-1" role="dialog" aria-labelledby="dialog-static-name" (onHidden)="OnHidden()">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div #myHandle class="modal-header">
        <h4 class="modal-title pull-left">Tạm ứng cược vỏ</h4>
        <button type="button" class="close pull-right" aria-label="Close" (click)="modalAddEdit.hide()">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">
        <form class="form-horizontal" novalidate #addEditForm="ngForm" (ngSubmit)="saveChange(addEditForm)"
          *ngIf="entity">
          <div class="box-body">
            <div class="form-group">
                          <div class="col-md-8">
              <div class="form-group">
                <label class="col-sm-3 control-label">Chi nhánh
                  <span class="error">*</span>
                </label>
                <div class="col-sm-9">
                  <ng-select name="donvi" [items]="listBranch" bindLabel="branchName" bindValue="id" [readonly]="true"
                    [(ngModel)]="entity.branchId" required placeholder="Chọn chi nhánh">
                  </ng-select>
                </div>
              </div>
              <div class="form-group">
                <label class="col-sm-3 control-label">Người tạm ứng
                  <span class="error">*</span>
                </label>
                <div class="col-sm-9">
                  <ng-select name="khachhang" [items]="listEmployee" bindLabel="employeeFullName" bindValue="id"
                    [(ngModel)]="entity.employeeId" required placeholder="Chọn nhân viên"
                    [readonly]="true" [clearable]="false">
                  </ng-select>
                </div>
              </div>
              <div class="form-group">
                <label class="col-sm-3 control-label">Khách hàng
                  <span class="error">*</span>
                </label>
                <div class="col-sm-9">
                    <ng-select [items]="listCustomer"  name="customercode" required
                    bindLabel="customerName"
                    bindValue="id"
                    [disabled]="flagXem"
                    [(ngModel)]="entity.customerId">
                    </ng-select>
                </div>
            </div>
              <div class="form-group">
                <label class="col-sm-3 control-label">Nội dung
                  <span class="error">*</span>
                </label>
                <div class="col-sm-9">
                  <ng-select name="noidung" [items]="listGroup" bindLabel="advanceGroupName" bindValue="id"
                    [(ngModel)]="entity.advanceGroupId" required placeholder="Chọn loại tạm ứng"
                    [readonly]="true" [clearable]="false">
                  </ng-select>
                </div>
              </div>
              <div class="form-group">
                <label class="col-sm-3 control-label">Loại cược
                  <span class="error">*</span>
                </label>
                <div class="col-sm-9">
                  <ng-select name="typebets" [items]="listType" bindLabel="name" bindValue="id"
                    [(ngModel)]="entity.type" required placeholder="Chọn loại cược" [readonly]="true">
                  </ng-select>
                </div>
              </div>
              <div class="form-group">
                <label class="col-sm-3 control-label">Hãng tàu</label>
                <!-- <div class="col-sm-9">
                  <input class="form-control" [(ngModel)]="entity.carriers" type="text" name="carriers" placeholder="Hãng tàu"
                    [readonly]="flagXem" />
                </div> -->
                <div class="col-sm-9">
                  <ng-select name="hangtau" [items]="listHangTaus" bindLabel="categoryName" bindValue="id"
                    [(ngModel)]="entity.carriersId" required placeholder="Chọn hãng tàu" [readonly]="flagXem">
                  </ng-select>
                </div>
              </div>
              <div class="form-group">
                <label class="col-sm-3 control-label">Ghi chú</label>
                <div class="col-sm-9">
                  <textarea class="form-control textrea-size" [(ngModel)]="entity.notes" name="ghichu" rows="3"
                    placeholder="Nhập ghi chú" [readonly]="flagXem"></textarea>
                </div>
              </div>
              <div *ngIf="_accept || entity.acceptStep==-1" class="form-group">
                <label class="col-sm-3 control-label">Phản hổi</label>
                <div class="col-sm-9">
                  <textarea style="color: red;" class="form-control textrea-size" [(ngModel)]="entity.feedback" name="feedback" rows="1"
                    placeholder="Nhập phản hổi" [readonly]="!_accept"></textarea>
                </div>
              </div>
              <!-- <div *ngIf="entity.acceptStep<=0"  class="form-group">
                <label class="col-sm-3 control-label"></label>
                <div class="col-sm-4">
                  <label class="custom-checkbox">
                    <input type="checkbox" [(ngModel)]="entity.status" name="status" />
                    <span class="helping-el"></span>
                    Chuyển duyệt
                  </label>
                </div>
              </div> -->
            </div>
            <div class="col-md-4">
              <div *ngIf="entity.id" class="form-group">
                <label class="col-sm-5 control-label">Số tham chiếu</label>
                <div class="col-sm-7">
                  <input class="form-control" [(ngModel)]="entity.refNo" type="text" name="refno" placeholder="Số phiếu"
                    [readonly]="true" />
                </div>
              </div>
              <div class="form-group">
                <label class="col-sm-5 control-label">Ngày lập</label>
                <div class="col-sm-7 date">
                  <input name="refdate" type="text" daterangepicker [options]="dateTimeOptions"
                    [(ngModel)]="entity.refDate" class="form-control" (selected)="selectedDate($event)"
                    (hideDaterangepicker)="closedDate($event)" autocomplete="off" [readonly]="flagXem" [disabled]="true">
                </div>
              </div>
              <div class="form-group">
                <label class="col-sm-5 control-label">Số tiền
                  <span class="error">*</span>
                </label>
                <div class="col-sm-7">
                  <input type="text" class="form-control so-tien" #sotien="ngModel" name="sotien"
                    [(ngModel)]="entity.amount" placeholder="Số tiền vay" [mask]="maskNumber" required minLength="6"
                    maxlength="12" [readonly]="flagXem" />
                  <small [hidden]="sotien.valid || (sotien.pristine && !addEditForm.submitted)" class="text-danger">
                    Nhập số tiền
                  </small>
                </div>
              </div>
              <div class="form-group">
                <div class="col-sm-12 text-right">
                  <label class="custom-checkbox">
                    <input type="checkbox" [(ngModel)]="entity.status" name="status" [disabled]="flagXem"/>
                    <span class="helping-el"></span>
                    Chuyển duyệt
                  </label>
                </div>
              </div>
              <div class="form-group" style="padding-top: 20px; text-align: right;">
                <div class="col-sm-12" *ngIf="!flagNew">
                  <button type="button" class="btn btn-sm btn-primary" (click)="attachFile()">
                    <i class="fa fa-upload" aria-hidden="true"></i> Đính kèm
                  </button>
                </div>
              </div>
            </div>
            </div>
            <hr *ngIf="flagEditExp">
              <div class="form-group" *ngIf="entity.acceptStep>1">
                <label class="col-sm-2 control-label">Giải trình</label>
                <div class="col-sm-10">
                  <textarea class="form-control textrea-size" [(ngModel)]="entity.explanationContents" name="explanationContents" rows="3"
                    placeholder="Nhập giải trình" [readonly]="!flagEditExp || entity.explanationStatus==1 || entity.explanationStatus==3"></textarea>
                </div>
              </div>
              <div class="form-group" *ngIf="entity.explanationStatus>0">
                <label class="col-sm-2 control-label">Phương án xử lý</label>
                <div class="col-sm-4">
                  <ng-select name="xuly" [items]="listArray" bindLabel="name" bindValue="id"
                  [(ngModel)]="solution" [disabled]="(!acceptPermission && !userLoged.isAdmin) || entity.explanationStatus>1" placeholder="Chọn phương án xử lý">
                </ng-select>
                </div>
                <label class="col-sm-2 control-label" *ngIf="solution==0">Hạn hoàn cược</label>
                <div class="col-sm-4" *ngIf="solution==0">
                <input name="ngaybd" type="text" daterangepicker [options]="ngaybatdauOption"
                  [(ngModel)]="entity.explanationDate" class="form-control"
                  (selected)="selectedNgaybatdau($event)" (hideDaterangepicker)="closedNgaybatdau($event)"
                  autocomplete="off" [disabled]="(!acceptPermission && !userLoged.isAdmin) || entity.explanationStatus>1">
              </div>
              </div>
              <div class="form-group" *ngIf="entity.explanationStatus>0">
                <label class="col-sm-2 control-label">Phản hổi</label>
                <div class="col-sm-10">
                  <textarea class="form-control textrea-size" [(ngModel)]="entity.explanationFeedback" name="explanationFeedback" rows="2"
                    placeholder="Nhập phản hổi" [readonly]="(!acceptPermission && !userLoged.isAdmin) || entity.explanationStatus>1"></textarea>
                </div>
              </div>
          </div>

             <!-- /.box-body -->
            <div class="box-footer text-right">
              <button *ngIf="(acceptPermission || userLoged.isAdmin) && entity.explanationStatus==1" type="button" (click)="changedExpAccept(true)"
                class="btn btn-success btn-sm">
                <i class="fa fa-check"></i> Duyệt giải trình</button>
                <button *ngIf="(acceptPermission || userLoged.isAdmin) && entity.explanationStatus==1" type="button" (click)="changedExpAccept(false)" [disabled]="entity.explanationFeedback?.trim().length<1"
                class="btn btn-warning btn-sm">
                <i class="fa fa-exclamation-triangle"></i> Từ chối giải trình</button>
                <button *ngIf="flagEditExp && (entity.explanationStatus<1 || entity.explanationStatus==2)" [disabled]="entity.explanationContents?.trim().length<1" type="button" (click)="updateExplanation()"
                class="btn btn-success btn-sm">
                <i class="fa fa-check"></i> Giải trình</button>
                <button *ngIf="_accept" type="button" (click)="changedAccept(true)"
                class="btn btn-success btn-sm">
                <i class="fa fa-check"></i> Duyệt</button>
              <button *ngIf="_accept" type="button" (click)="changedAccept(false)" [disabled]="entity.feedback?.trim().length<1"
                class="btn btn-warning btn-sm">
                <i class="fa fa-exclamation-triangle"></i> Từ chối</button>
              <button *ngIf="!flagXem" type="submit" class="btn btn-primary btn-sm"
                [disabled]="!addEditForm.form.valid || flagSave">
                <i class="fa fa-save"></i> Lưu</button>
              <button type="button" (click)="modalAddEdit.hide()" class="btn btn-danger btn-sm">
                <i class="fa fa-close"></i> Hủy</button>
            </div>
          <!-- /.box-footer -->
        </form>
      </div>
    </div>
  </div>
</div>
<modal-attachfile *ngIf="viewAttachFiles" (CloseModal)="closeModalAttachFiles()">
</modal-attachfile>
