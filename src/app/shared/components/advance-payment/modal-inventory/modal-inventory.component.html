<div ngDraggable [handle]="myHandle" class="modal fade" bsModal #modalAddEdit="bs-modal" [config]="{backdrop: 'static'}"
  tabindex="-1" role="dialog" aria-labelledby="dialog-static-name" (onHidden)="OnHidden()">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div #myHandle class="modal-header">
        <h4 class="modal-title pull-left">BIÊN BẢN KIỂM KÊ DƯ NỢ TẠM ỨNG-THANH TOÁN</h4>
        <button type="button" class="close pull-right" aria-label="Close" (click)="modalAddEdit.hide()">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">
        <form class="form-horizontal" novalidate #addEditForm="ngForm" (ngSubmit)="saveChange(addEditForm)"
          *ngIf="entity">
          <div class="box-body">
            <div class="col-md-8">
              <div class="form-group">
                <label class="col-sm-3 control-label">Chi nhánh
                  <span class="error">*</span>
                </label>
                <div class="col-sm-9">
                  <ng-select name="donvi" [items]="listBranch" bindLabel="branchName" bindValue="id" [readonly]="true"
                    [(ngModel)]="entity.branchId" required placeholder="Chọn chi nhánh">
                  </ng-select>
                </div>
              </div>
              <div class="form-group">
                <label class="col-sm-3 control-label">Nhân viên
                  <span class="error">*</span>
                </label>
                  <div class="col-sm-9">
                    <ng-select name="typebets" [items]="listEmployee" bindLabel="employeeFullName" bindValue="id"
                      [(ngModel)]="entity.employeeId" required placeholder="Chọn nhân viên" [readonly]="entity.id>0" (change)="changedEmployee($event)">
                    </ng-select>
                </div>
              </div>
              <div class="form-group">
                <label class="col-sm-3 control-label">Nội dung
                  <span class="error">*</span>
                </label>
                <div class="col-sm-9">
                  <textarea class="form-control textrea-size" [(ngModel)]="entity.reason" name="reason" rows="5"
                    placeholder="Nhập nội dung..." [readonly]="flagXem" required></textarea>
                </div>
              </div>
              <div class="form-group">
                <label class="col-sm-3 control-label">Ghi chú</label>
                <div class="col-sm-9">
                  <textarea class="form-control textrea-size" [(ngModel)]="entity.notes" name="ghichu" rows="3"
                    placeholder="Nhập ghi chú" [readonly]="flagXem"></textarea>
                </div>
              </div>
            </div>
            <div class="col-md-4">
              <div *ngIf="entity.refNo" class="form-group">
                <label class="col-sm-5 control-label">Số</label>
                <div class="col-sm-7">
                  <input class="form-control" [(ngModel)]="entity.refNo" type="text" name="refno" placeholder="Số phiếu"
                    [readonly]="true" />
                </div>
              </div>
              <div class="form-group">
                <label class="col-sm-5 control-label">Đến ngày</label>
                <div class="col-sm-7 date">
                  <input name="refdate" type="text" daterangepicker [options]="dateTimeOptions"
                    [(ngModel)]="_ngay" class="form-control" (selected)="selectedDate($event)"
                    (hideDaterangepicker)="closedDate($event)" autocomplete="off"
                    [readonly]="flagXem" [disabled]="true">
                </div>
              </div>

              <div class="form-group">
                <label class="col-sm-5 control-label">Đầu kỳ
                  <!-- <span class="error">*</span> -->
                </label>
                <div class="col-sm-7">
                  <input type="text" class="form-control so-tien" #sotien="ngModel" name="dauky"
                    [(ngModel)]="entity.beginPeriod" placeholder="Số dư đầu kỳ" [mask]="maskNumber" [allowNegativeNumbers]="true"
                    [readonly]="true"/>
                  <small [hidden]="sotien.valid || (sotien.pristine && !addEditForm.submitted)" class="text-danger">
                    Nhập số tiền
                  </small>
                </div>
              </div>

              <div class="form-group">
                <label class="col-sm-5 control-label">Tạm ứng
                </label>
                <div class="col-sm-7">
                  <div class="input-group">
                  <input type="text" class="form-control so-tien" name="tamung"
                    [(ngModel)]="entity.advanceAmount" placeholder="Số tiền tạm ứng" [mask]="maskNumber" [allowNegativeNumbers]="true"
                    [readonly]="true"/>
                  <span *ngIf="!entity.isComplete  && entity.employeeId" class="input-group-addon" (click)="showModalSelect(0)">
                    <i class="fa fa-plus" title="Chọn tạm ứng"></i>
                  </span>
                </div>
                </div>
              </div>

              <div class="form-group">
                <label class="col-sm-5 control-label">Thanh toán
                </label>
                <div class="col-sm-7">
                  <div class="input-group">
                  <input type="text" class="form-control so-tien" #sotien="ngModel" name="thanhtoan"
                    [(ngModel)]="entity.paymentAmount" placeholder="Số tiền thanh toán" [mask]="maskNumber" [allowNegativeNumbers]="true"
                    [readonly]="true"/>
                  <span *ngIf="!entity.isComplete  && entity.employeeId" class="input-group-addon" (click)="showModalSelect(1)">
                    <i class="fa fa-plus" title="Chọn thanh toán"></i>
                  </span>
                </div>
                </div>
              </div>

              <div class="form-group">
                <label class="col-sm-5 control-label">Số dư cuối
                  <span class="error">*</span>
                </label>
                <div class="col-sm-7">
                  <input type="text" class="form-control so-tien" #sotien="ngModel" name="sotien"
                    [(ngModel)]="entity.amount" placeholder="Số tiền" [mask]="maskNumber" [allowNegativeNumbers]="true" required
                    [readonly]="true"/>
                  <small [hidden]="sotien.valid || (sotien.pristine && !addEditForm.submitted)" class="text-danger">
                    Nhập số tiền
                  </small>
                </div>
              </div>
              <!-- <div class="form-group">
                <div class="col-sm-12 text-right">
                  <label class="custom-checkbox">
                    <input type="checkbox" [(ngModel)]="entity.status" name="status" />
                    <span class="helping-el"></span>
                    Chuyển duyệt
                  </label>
                </div>
              </div> -->
            </div>
          </div>
             <!-- /.box-body -->
             <div class="row box-footer">
              <div class="col-md-6 text-left">
                <button *ngIf="entity.id" type="button" class="btn btn-info btn-sm" title="Chứng từ đính kèm" (click)="showAttachFile()">
                  <i class="fa fa-file-pdf-o" aria-hidden="true"></i> Chứng từ ...
              </button>
              </div>
              <div class="col-md-6 text-right">
                <button *ngIf="!flagXem" type="submit" class="btn btn-primary btn-sm"
                  [disabled]="!addEditForm.form.valid || flagSave">
                  <i class="fa fa-save"></i> Lưu</button>
                <button type="button" (click)="modalAddEdit.hide()" class="btn btn-danger btn-sm">
                  <i class="fa fa-close"></i> Hủy</button>
              </div>
             </div>
          <!-- /.box-footer -->
        </form>
      </div>
    </div>
  </div>
</div>
<modal-attachfile *ngIf="viewAttachFiles" (SaveSuccess)="saveSuccessFile($event)" (CloseModal)="closeModalFile()"></modal-attachfile>
<modal-select-employee-debit *ngIf="viewSelect" (SaveSuccess)="saveModalSelect($event)" (CloseModal)="closeModalSelect()"></modal-select-employee-debit>
