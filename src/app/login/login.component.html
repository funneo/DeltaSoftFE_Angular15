<div class="login-page">
<div class="login-box">
  <!-- <div class="login-logo">
    <a href="#">
      <b>HỆ THỐNG </b>
    </a>
  </div> -->
  <!-- /.login-logo -->
  <div class="login-box-body">
    <!-- <p class="login-box-msg">Đăng nhập hệ thống</p> -->
    <div class="logo-img">
      <img src="/assets/img/logo-delta.png" />
    </div>
    <br>
    <!-- <div>
      <h2 style="color: red;">TESTING - SYSTEM</h2>
    </div> -->
    <!-- <h3 class="login-box-msg" style="font-weight: bold;">DELTA-ERP</h3> -->
    <form name="form" (ngSubmit)="f.form.valid && login()" #f="ngForm" novalidate>
      <div [ngClass]="{'form-group': true, 'has-warning': f.submitted && !username.valid, 'third': false}">

        <input type="text" class="form-control" name="username" [(ngModel)]="user.userName" #username="ngModel" required
          placeholder="Tên đăng nhập" focus>
        <span class="glyphicon glyphicon-user form-control-feedback"></span>
        <span *ngIf="f.submitted && !username.valid" class="help-block">Nhập tên đăng nhập</span>
      </div>
      <div [ngClass]="{'form-group': true, 'has-warning': f.submitted && !password.valid, 'third': false}">
        <input type="password" class="form-control" name="password" [(ngModel)]="user.passWord" #password="ngModel"
          required placeholder="Mật khẩu">
        <span class="glyphicon glyphicon-lock form-control-feedback"></span>
        <span *ngIf="f.submitted && !password.valid" class="help-block">Nhập mật khẩu</span>
      </div>
      <div [ngClass]="{'form-group': true, 'has-warning': f.submitted && !branch.valid, 'third': false}">
        <ng-select name="branch" [items]="listBranch" bindLabel="name" bindValue="id" [(ngModel)]="user.branchId"
          #branch="ngModel" required placeholder="Chọn chi nhánh">
        </ng-select>
        <span *ngIf="f.submitted && !branch.valid" class="help-block">Chọn chi nhánh</span>
      </div>
      <div class="row">
        <div class="col-xs-7">
        </div>
        <!-- /.col -->
        <div class="col-xs-5">
          <button [disabled]="loading" type="submit" class="btn btn-success btn-block btn-flat">Đăng nhập</button>
        </div>
        <!-- /.col -->
      </div>
    </form>
  </div>
</div>
</div>
