<div class="box box-primary box-chieu-cao">
  <div class="row">
    <div class="box-header with-border">
      <div class="col-md-2">
        <h3 class="box-title">Tồn quỹ</h3>
      </div>
      <div class="col-md-2">
        <input type="text" daterangepicker [options]="dateOptions" (selected)="selectedDate($event)"
          class="form-control">
      </div>
      <div class="col-md-2">
        <ng-select name="chinhanh" [items]="listBranch" bindLabel="branchCode" bindValue="id"
          [(ngModel)]="_branchId" (change)="changedBranch()" placeholder="Chọn chi nhánh..." [clearable]="false" [readonly]="_auth>0">
        </ng-select>
      </div>
      <div class="col-md-3">
        <ng-select name="accountlist" [items]="listAccountList" bindLabel="name" bindValue="id"
          [(ngModel)]="accountListId" (change)="changedQuy($event)" placeholder="Chọn quỹ...">
        </ng-select>
      </div>
      <div class="col-md-3">
        <div class="input-group">
          <input type="text" class="form-control" name="filter" (keyup.enter)="timKiem()" [(ngModel)]="keyword"
            placeholder="Từ khóa: Tên quỹ,..." />
          <span class="input-group-btn">
            <button class="btn btn-info btn-flat btn-sm" type="button" (click)="timKiem()">
              <i class="fa fa-search"></i>
            </button>
          </span>
        </div>
      </div>
      <!-- <div class="col-md-2 text-right">
        <button class="btn btn-success btn-sm" appPermission appFunction="FUNDRESERVE" appAction="EXPORT">
          <i class="fa fa-file-excel-o"></i> Xuất dữ liệu
        </button>
      </div> -->
    </div>
  </div>
  <!-- /.box-header -->
  <div class="box-body table-responsive no-padding">
    <table class="table table-bordered table-striped table-hover">
      <thead>
        <tr>
          <th>Tên quỹ</th>
          <th>Đầu kỳ</th>
          <th>Thu trong kỳ</th>
          <th>Chi trong kỳ</th>
          <th>Cuối kỳ</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of listFundReserve" class="{{item.id==0? 'tong-cong':''}}">
          <td>
            <a [routerLink]="[]" (click)="showDetail(item)">{{item.tenQuy}}</a>
          </td>
          <td class="so-tien">{{item.dauKy|VND}}</td>
          <td class="so-tien">{{item.thu|VND}}</td>
          <td class="so-tien">{{item.chi|VND}}</td>
          <td class="so-tien">{{item.cuoiKy|VND}}</td>
        </tr>
        <tr *ngIf="listFundReserve?.length == 0">
          <td colspan="100%">Không có bản ghi nào được tìm thấy!</td>
        </tr>
      </tbody>
    </table>
  </div>
  <!-- /.box-body -->
  <div class="box-footer no-padding">
    <div *ngIf="listFundReserve?.length > 0" class="col-md-12 footer-phantrang">
      <div class="row">
        <div class="col-md-5">
          <div class="dataTables_info">
            <span>Tổng số bản ghi: {{ totalRows }}</span>
          </div>
        </div>
        <div class="col-md-7 text-right">
          <div class="page">
            <pagination [totalItems]="totalRows" [(ngModel)]="pageIndex" [maxSize]="5"
              (pageChanged)="pageChanged($event)" [itemsPerPage]="pageSize" previousText="&lsaquo;" nextText="&rsaquo;"
              firstText="&laquo;" lastText="&raquo;">
            </pagination>
          </div>
        </div>
      </div>
    </div>
  </div>
  <!-- /.box -->
</div>
