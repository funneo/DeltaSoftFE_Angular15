<div class="box box-primary box-chieu-cao">
  <div class="row">
    <div class="box-header with-border">
      <div class="col-md-2">
        <h3 class="box-title">Hoàn ứng vé ETC</h3>
      </div>
      <div class="col-md-2">
          <input type="text" daterangepicker [options]="dateOptions" (selected)="selectedDate($event)"
            class="form-control">
        </div>
      <div class="col-md-2">
        <ng-select name="driver" [items]="listBranch" bindLabel="branchCode" bindValue="id" [(ngModel)]="branchId"
        placeholder="Chọn chi nhánh..."  [disabled]="!adminPerrmission" (change)="changedBranch($event)">
        </ng-select>
      </div>
      <div class="col-md-2">
        <div class="input-group">
          <input type="text" class="form-control" name="filter" (keyup.enter)="timKiem()" [(ngModel)]="keyword"
            placeholder="Từ khóa" />
          <span class="input-group-btn">
            <button style="height: 28px;" class="btn btn-info btn-flat btn-sm" type="button" (click)="timKiem()">
              <i class="fa fa-search"></i>
            </button>
          </span>
          <span class="input-group-btn">
            <button style="height: 28px;" class="btn btn-success btn-sm" type="button" (click)="export()">
              <i class="fa fa-file-excel-o"></i>
            </button>
          </span>
        </div>
      </div>
      <div class="col-md-4 text-right">
        <button class="btn btn-success btn-sm" (click)="add()" appPermission appFunction="RPE"
          appAction="CREATE">
          <i class="fa fa-plus"></i> Thêm
        </button>
        <button class="btn btn-primary btn-sm" (click)="edit(false)" [disabled]="!flagEdit" appPermission
          appFunction="RPE" appAction="UPDATE">
          <i class="fa fa-edit"></i> Sửa
        </button>
        <button class="btn btn-danger btn-sm" (click)="deleteConfirm()" [disabled]="!flagDelete" appPermission
          appFunction="RPE" appAction="DELETE">
          <i class="fa fa-trash"></i> Xóa
        </button>
        <button class="btn btn-info btn-sm" (click)="edit(true)" [disabled]="!flagEdit">
          <i class="fa fa-eye"></i> Xem
        </button>
        <button class="btn btn-success btn-sm" (click)="exportDetail()" >
          <i class="fa fa-file-excel-o"></i> Export
        </button>


      </div>
    </div>
  </div>
  <!-- /.box-header -->
  <div class="box-body table-responsive no-padding">
    <table class="table table-bordered table-hover">
      <thead>
        <tr>
          <th></th>
          <th>Sô phiếu</th>
          <th>Người tạo</th>
          <th>Ngày tạo</th>
          <th>Nội dung</th>
          <th>Tổng tiền</th>
          <th>Trạng thái</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of listData" (click)="clickRow(item)">
          <td class="table-checkbox">
            <label class="custom-checkbox">
              <input type="checkbox" value="{{ item.id }}" [checked]="item.checked" disabled />
              <span class="helping-el"></span>
            </label>
          </td>
          <td>
              <span> <b>
                 {{item.refNo}}
              </b></span>
          </td>
        <td>
          <span>
             {{item.createdByName}}
          </span>
        </td>
          <td>
              <span>
                {{item.createdDate | date:'dd/MM/yyyy'}}
              </span>
          </td>
          <td>{{item.notes}}</td>
          <td style="font-weight: bold; text-align: right;">{{item.totalCost | number}}</td>
          <td>
            <span [ngClass]="{'label label-info': item.status===0,
              'label label-warning': item.status===1,
              'label label-success': item.status===2,
              'label label-danger': item.status===-1}">{{item.rStatus}}</span>
            </td>
        </tr>
        <tr *ngIf="listData?.length == 0">
          <td colspan="100%">Không có bản ghi nào được tìm thấy!</td>
        </tr>
      </tbody>
    </table>
  </div>
  <!-- /.box-body -->
  <div class="box-footer no-padding">
    <div *ngIf="totalRows> 0" class="col-md-12 footer-phantrang">
      <div class="row">
        <div class="col-md-5">
          <div class="dataTables_info">
            <span>Tổng số bản ghi: {{ totalRows }}</span>
          </div>
        </div>
        <div class="col-md-7 text-right">
          <div class="page">
            <pagination [totalItems]="totalRows" [(ngModel)]="pageIndex" [maxSize]="5"
              (pageChanged)="pageChanged($event)" [itemsPerPage]="pageSize" previousText="&lsaquo;" nextText="&rsaquo;"
              firstText="&laquo;" lastText="&raquo;">
            </pagination>
          </div>
        </div>
      </div>
    </div>
  </div>
  <!-- /.box -->
</div>
<modal-repayment-etc *ngIf="viewModal" (SaveSuccess)="saveSuccess()" (CloseModal)="closeModal()">
</modal-repayment-etc>
