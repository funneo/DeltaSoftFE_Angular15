<div class="box box-primary box-chieu-cao">
    <div class="row">
      <div class="box-header with-border">
        <div class="col-md-2">
          <h3 class="box-title">Hạn mức dầu lái xe</h3>
        </div>
        <div class="col-md-3" *ngIf="adminPermission">
          <ng-select name="khachhang" [items]="listBranch" bindLabel="branchName" bindValue="id"
            [(ngModel)]="_branchId" (change)="changedBranch($event)" placeholder="Chọn chi nhánh...">
          </ng-select>
        </div>
        <div class="col-md-3">
          <div class="input-group">
            <input type="text" class="form-control" name="filter" (keyup.enter)="timKiem()" [(ngModel)]="keyword"
              placeholder="Từ khóa" />
            <span class="input-group-btn">
              <button class="btn btn-info btn-flat btn-sm" type="button" (click)="timKiem()">
                <i class="fa fa-search"></i>
              </button>
            </span>
          </div>
        </div>
        <div class="col-md-4 text-right">
          <button class="btn btn-danger btn-sm" (click)="deleteConfirm()" [disabled]="!flagDelete" appPermission
            appFunction="DRIVERFUELLIMIT" appAction="DELETE">
            <i class="fa fa-trash"></i> Xóa
          </button>
        </div>
      </div>
    </div>
    <!-- /.box-header -->
    <div class="box-body table-responsive no-padding">
      <table class="table table-bordered table-striped table-hover">
        <thead>
          <tr>
            <th>Nhân viên</th>
            <th>Số lượng (lít)</th>
            <th>Ghi chú</th>
            <th>Trạng thái</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let item of listDriverFuelLimit" (click)="clickRow(item)">
            <td>
              <a [routerLink]="[]" (click)="showModal(item)">{{item.driverName}}</a>
            </td>
            <td class="so-tien">{{item.fuelLimit|number: '1.2-2'}}</td>
            <td>{{item.notes }}</td>
            <td class="trang-thai">
              <span [ngClass]="
                  item.status  ? 'label label-success' : 'label label-danger'
                ">{{ item.status | Status }}</span>
            </td>
          </tr>
          <tr *ngIf=" listDriverFuelLimit?.length == 0">
            <td colspan="100%">Không có bản ghi nào được tìm thấy!</td>
          </tr>
        </tbody>
      </table>
    </div>
    <!-- /.box-body -->
    <div class="box-footer no-padding">
      <div *ngIf="listDriverFuelLimit?.length > 0" class="col-md-12 footer-phantrang">
        <div class="row">
          <div class="col-md-5">
            <div class="dataTables_info">
              <span>Tổng số bản ghi: {{ totalRows }}</span>
            </div>
          </div>
          <div class="col-md-7 text-right">
            <div class="page">
              <pagination [totalItems]="totalRows" [(ngModel)]="pageIndex" [maxSize]="5"
                (pageChanged)="pageChanged($event)" [itemsPerPage]="pageSize" previousText="&lsaquo;" nextText="&rsaquo;"
                firstText="&laquo;" lastText="&raquo;">
              </pagination>
            </div>
          </div>
        </div>
      </div>
    </div>
    <!-- /.box -->
  </div>

  <modal-driver-fuel-limit *ngIf="viewModal" (SaveSuccess)="saveSuccess()" (CloseModal)="closeModal()">
  </modal-driver-fuel-limit>
  <!-- <div [ngBusy]="busy"></div> -->
