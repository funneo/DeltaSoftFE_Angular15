<div class="box box-primary box-chieu-cao">
    <div class="row">
      <div class="box-header with-border">
        <div class="col-md-3">
          <h3 class="box-title">Dư nợ dầu lái xe</h3>
        </div>
        <div class="col-md-3">
          <ng-select name="chinhanh" [items]="listBranch" bindLabel="branchCode" bindValue="id"
            [(ngModel)]="_branchId" (change)="changedBranch()" placeholder="Chọn chi nhánh..."
            [clearable]="false" [readonly]="_quyen>0">
          </ng-select>
        </div>
        <div class="col-md-3">
          <div class="input-group">
            <input type="text" class="form-control" name="filter" (keyup.enter)="timKiem()" [(ngModel)]="keyword"
              placeholder="Từ khóa" />
            <span class="input-group-btn">
              <button class="btn btn-info btn-flat btn-sm" type="button" (click)="timKiem()">
                <i class="fa fa-search"></i>
              </button>
            </span>
          </div>
        </div>
        <!-- <div class="col-md-4 text-right">
          <button class="btn btn-success btn-sm" appPermission appFunction="EMPLOYEEDEBIT" appAction="EXPORT">
            <i class="fa fa-file-excel-o"></i> Xuất dữ liệu
          </button>
        </div> -->
      </div>
    </div>
    <!-- /.box-header -->
    <div class="box-body table-responsive no-padding">
      <table class="table table-bordered table-striped table-hover">
        <thead>
          <tr>
            <th>Lái xe</th>
            <th>Điện thoại</th>
            <th>Dư nợ</th>
            <!-- <th>Ngày phát sinh cuối cùng</th> -->
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let item of listDebitCredits">
            <td>
              <a [routerLink]="[]" (click)="showDetail(item)">{{item.employeeFullName}}</a>
            </td>
            <td >{{item.telephone}}</td>
            <td class="so-tien">{{item.debitBalance}}</td>
            <!-- <td style="text-align: right;">{{item.updatedDate|date:'dd-MM-yyyy'}}</td> -->
          </tr>
          <tr *ngIf="listDebitCredits?.length == 0">
            <td colspan="100%">Không có bản ghi nào được tìm thấy!</td>
          </tr>
        </tbody>
      </table>
    </div>
    <!-- /.box-body -->
    <div class="box-footer no-padding">
      <div *ngIf="listDebitCredits?.length > 0" class="col-md-12 footer-phantrang">
        <div class="row">
          <div class="col-md-5">
            <div class="dataTables_info">
              <span>Tổng số bản ghi: {{ totalRows }}</span>
            </div>
          </div>
          <div class="col-md-7 text-right">
            <div class="page">
              <pagination [totalItems]="totalRows" [(ngModel)]="pageIndex" [maxSize]="5"
                (pageChanged)="pageChanged($event)" [itemsPerPage]="pageSize" previousText="&lsaquo;" nextText="&rsaquo;"
                firstText="&laquo;" lastText="&raquo;">
              </pagination>
            </div>
          </div>
        </div>
      </div>
    </div>
    <!-- /.box -->
  </div>
