<div class="box box-primary box-chieu-cao">
    <div class="row">
      <div class="box-header with-border">
        <div class="col-md-2">
          <h3 class="box-title">Danh mục Vị trí trạm thu phí</h3>
        </div>
        <div class="col-md-3">
        </div>
        <div class="col-md-3">
          <div class="input-group"> 
            <input type="text" class="form-control" name="filter" (keyup.enter)="timKiem()" [(ngModel)]="keyword"
              placeholder="Từ khóa" />
            <span class="input-group-btn">
              <button class="btn btn-info btn-flat btn-sm" type="button" (click)="timKiem()">
                <i class="fa fa-search"></i>
              </button>
            </span>
          </div>
        </div>
        <div class="col-md-4 text-right">
          <button class="btn btn-success btn-sm" (click)="get()" appPermission appFunction="TOLLLOCATIONS"
            appAction="CREATE">
            <i class="fa fa-plus"></i> Cập nhật dữ liệu từ EUP
          </button>
        </div>
      </div>
    </div>
    <!-- /.box-header -->
    <div class="box-body table-responsive no-padding">
      <table class="table table-bordered table-striped table-hover">
        <thead>
          <tr>
            <th class="table-checkbox">
              <label class="custom-checkbox">Id
              </label>
            </th>
            <th>Tên vị trí trạm</th>
            <th>Longtitude</th>
            <th>Latitude</th>
            <th>Kích hoạt</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let item of listTollLocation">
            <td>{{item.id}}
            </td>
            <td>{{item.name}}</td>
            <td>{{item.longtitude}}</td>
            <td>
              <span>
                {{item.latitude}}
              </span>
            <td>{{item.actived}}</td>
          </tr>
          <tr *ngIf="totalRows == 0 ">
            <td colspan="100%">Không có bản ghi nào được tìm thấy!</td>
          </tr>
        </tbody>
      </table>
    </div>
    <!-- /.box-body -->
    <div class="box-footer no-padding">
      <div *ngIf="listTollLocation?.length > 0" class="col-md-12 footer-phantrang">
        <div class="row">
          <div class="col-md-5">
            <div class="dataTables_info">
              <span>Tổng số bản ghi: {{ totalRows }}</span>
            </div>
          </div>
          <div class="col-md-7 text-right">
            <div class="page">
              <pagination [totalItems]="totalRows" [(ngModel)]="pageIndex" [maxSize]="5"
                (pageChanged)="pageChanged($event)" [itemsPerPage]="pageSize" previousText="&lsaquo;" nextText="&rsaquo;"
                firstText="&laquo;" lastText="&raquo;">
              </pagination>
            </div>
          </div>
        </div>
      </div>
    </div>
    <!-- /.box -->
  </div>
