<div class="box box-primary box-chieu-cao">
    <div class="row">
      <div class="box-header with-border">
        <div class="col-md-2">
          <h3 class="box-title">Danh mục Trạm thu phí</h3>
        </div>
        <div class="col-md-3">
        </div>
        <div class="col-md-3">
          <div class="input-group">
            <input type="text" class="form-control" name="filter" (keyup.enter)="timKiem()" [(ngModel)]="keyword"
              placeholder="Từ khóa" />
            <span class="input-group-btn">
              <button class="btn btn-info btn-flat btn-sm" type="button" (click)="timKiem()">
                <i class="fa fa-search"></i>
              </button>
            </span>
          </div>
        </div>
        <div class="col-md-4 text-right">
          <button class="btn btn-success btn-sm" (click)="add()" appPermission appFunction="F026"
            appAction="CREATE">
            <i class="fa fa-plus"></i> Thêm
          </button>
          <button class="btn btn-primary btn-sm" (click)="edit(false)" [disabled]="!flagEdit" appPermission
            appFunction="F026" appAction="UPDATE">
            <i class="fa fa-edit"></i> Sửa
          </button>
          <button class="btn btn-danger btn-sm" (click)="deleteConfirm()" [disabled]="!flagDelete" appPermission
            appFunction="F026" appAction="DELETE">
            <i class="fa fa-trash"></i> Xóa
          </button>
          <button class="btn btn-info btn-sm" (click)="edit(true)" [disabled]="!flagEdit">
            <i class="fa fa-eye"></i> Xem
          </button>
        </div>
      </div>
    </div>
    <!-- /.box-header -->
    <div class="box-body table-responsive no-padding">
        <table class="table table-bordered table-striped table-hover">
            <thead>
                <tr>
                    <th></th>
                    <th>Từ cảng/bãi</th>
                    <th>Đến cảng/bãi</th>
                    <th>Khoảng cách</th>
                    <th>Tình trạng</th>
                </tr>
            <tr>
                <th></th>
                <th><input class="form-control" [(ngModel)]="filterColumns.fromPortsName" (input)="filterData()" name="fromPortsId" /></th>
                <th><input class="form-control" [(ngModel)]="filterColumns.toPortsName" (input)="filterData()" name="toPortsId" /></th>
                <th><input class="form-control" [(ngModel)]="filterColumns.km" (input)="filterData()" name="km" /></th>
                <th>
                     <ng-select name="filterType" (change)="filterData()" [(ngModel)]="statusSelected" 
                            [clearable]="false" [items]="array" bindLabel="text" bindValue="value">
                            </ng-select>
                </th>


            </tr>
            </thead>
            <tbody>
            <tr *ngFor="let item of listFilter" (click)="clickRow(item)">
                <td class="table-checkbox">
                    <label class="custom-checkbox">
                        <input type="checkbox" value="{{ item.id }}" [checked]="item.checked" disabled />
                        <span class="helping-el"></span>
                    </label>
                    </td>
                <td>{{ item.fromPortsName }}</td>
                <td>{{ item.toPortsName }}</td>
                <td>{{ item.km }}</td>
                <td>{{ item.rStatus }}</td>
            </tr>
            </tbody>
        </table>
    </div>
    <!-- /.box-body -->
    <div class="box-footer no-padding">
      <div *ngIf="listData?.length > 0" class="col-md-12 footer-phantrang">
        <div class="row">
          <div class="col-md-5">
            <div class="dataTables_info">
              <span>Tổng số bản ghi: {{ totalRows }}</span>
            </div>
          </div>
          <div class="col-md-7 text-right">
            <div class="page">
              <pagination [totalItems]="totalRows" [(ngModel)]="pageIndex" [maxSize]="5"
                (pageChanged)="pageChanged($event)" [itemsPerPage]="pageSize" previousText="&lsaquo;" nextText="&rsaquo;"
                firstText="&laquo;" lastText="&raquo;">
              </pagination>
            </div>
          </div>
        </div>
      </div>
    </div>
    <!-- /.box -->
  </div>

  <modal-transit-ports *ngIf="viewModal" (SaveSuccess)="saveSuccess()" (CloseModal)="closeModal()">
  </modal-transit-ports>

  <!-- <div [ngBusy]="busy"></div> -->
